    - agent-maintainer: Agent YAML maintenance
    - release-coordinator: Version control and deployments
    - quality-auditor: Performance and error monitoring
    - integration-architect: Cross-platform bridges
    - mcp-tools-manager: MCP server and tools
    - documentation-curator: Documentation maintenance
    - model-proxy-manager: Multi-model AI configuration and management
    
  platform_specialists:
    hubspot:
      - hubspot-orchestrator: Complex HubSpot operations
      - hubspot-contact-manager: Contact and list management
      - hubspot-marketing-automation: Workflows and automation
      - hubspot-pipeline-manager: Sales pipeline configuration
      - hubspot-analytics-reporter: Analytics and reporting
      - hubspot-integration-specialist: API and webhooks
      - hubspot-workflow-builder: Workflow creation
      - hubspot-email-campaign-manager: Email campaigns
      
    salesforce:
      - sfdc-orchestrator: Complex Salesforce operations (ACTIVE)
      - sfdc-planner: Requirements analysis (ACTIVE)
      - sfdc-metadata-manager: Objects and fields (ACTIVE)
      - sfdc-security-admin: Profiles and permissions (ACTIVE)
      - sfdc-automation-builder: Flows and process builders (ACTIVE)
      - sfdc-data-operations: Data management (ACTIVE)
      - sfdc-deployment-manager: Change sets and deployments (ACTIVE)
      - sfdc-integration-specialist: APIs and integrations (ACTIVE)
      - sfdc-reports-dashboards: Reports and analytics
      - sfdc-apex-developer: Apex code development (ACTIVE)
      - sfdc-lightning-page-manager: Lightning page configuration (NEW)
      - sfdc-permission-analyzer: Deep permission analysis (NEW)
      - sfdc-data-validator: Data validation and quality (NEW)

workflow_patterns:
  initial_assessment:
    steps:
      - Identify platform (HubSpot, Salesforce, other)
      - Determine operation type (config, deployment, integration, etc.)
      - Assess complexity and dependencies
      - Select appropriate sub-agents
      - Create execution plan
      
  delegation_strategy:
    single_platform:
      - Use platform-specific orchestrator for complex tasks
      - Delegate to specialized agents for focused work
      - Monitor progress and handle exceptions
      
    cross_platform:
      - Coordinate through integration-architect
      - Ensure data consistency across platforms
      - Manage synchronization and mappings
      
    infrastructure:
      - Route through management team agents
      - Ensure compliance with standards
      - Update documentation automatically

error_handling:
  strategies:
    - Cascade errors to quality-auditor
    - Trigger auto-recovery procedures
    - Escalate critical issues
    - Log all errors to central system
    - Generate incident reports

  recovery_procedures:
    - Automatic rollback on failure
    - State preservation and restoration
    - Retry with exponential backoff
    - Alternative path execution
    - Manual intervention triggers

qa_validation:
  regression_detection:
    description: "Detect suspicious QA result changes that indicate stale data or test execution issues"
    protocol:
      - Check for significant pass rate drops (>20%)
      - Compare current results with previous QA sessions
      - Validate report freshness and metadata
      - Flag suspicious patterns for re-verification

    critical_scenarios:
      scenario_1:
        condition: "Pass rate drops from 100% to <80% without code changes"
        severity: CRITICAL
        response: |
          🚨 STOP IMMEDIATELY - DO NOT REPORT REGRESSION

          This pattern indicates stale data or test execution error, not actual regression.

          REQUIRED ACTIONS:
          1. Verify test report freshness (<24 hours)
          2. Check if reading old report instead of executing fresh tests
          3. Validate org state matches report metadata
          4. Re-execute tests if report is stale
          5. Only report regression after fresh test verification

      scenario_2:
        condition: "QA results show new failures on previously passing tests"
        severity: HIGH
        response: |
          ⚠️ INVESTIGATE BEFORE REPORTING

          Potential causes:
          - Reading stale test report
          - Org state changed since last test
          - Test data issues
          - Actual regression

          REQUIRED VALIDATION:
          1. Compare report timestamps with current time
          2. Run live verification test on specific failure
          3. Check org metadata changes
          4. Cross-reference with deployment history

      scenario_3:
        condition: "Multiple test reports exist with conflicting results"
        severity: MEDIUM
        response: |
          ⚠️ REPORT AMBIGUITY DETECTED

          REQUIRED ACTIONS:
          1. Archive old reports using test-report-manager.js
          2. Identify most recent report by execution_timestamp
          3. Validate chosen report freshness
          4. Execute fresh tests if latest report is >24 hours old

    validation_tools:
      - name: "test-report-manager.js"
        purpose: "Validate report freshness and compare results"
        location: "scripts/lib/test-report-manager.js"
        usage: "node scripts/lib/test-report-manager.js validate <report-file> --max-age 24"

      - name: "qa-workflow-validator.js"
        purpose: "Validate QA workflow mode and detect regressions"
        location: "scripts/lib/qa-workflow-validator.js"
        usage: "node scripts/lib/qa-workflow-validator.js validate-mode review <org> ./reports"

    thresholds:
      critical_regression: 40  # % drop triggers CRITICAL alert and immediate STOP
      high_regression: 20      # % drop triggers HIGH alert and investigation
      medium_regression: 10    # % drop triggers MEDIUM alert and monitoring
      report_max_age: 24       # hours - reject reports older than this

    mandatory_checks:
      before_reporting_regression:
        - "Verify report timestamp is <24 hours old"
        - "Confirm report metadata matches current org state"
        - "Check if test execution actually occurred vs reading old report"
        - "Validate no conflicting reports exist in reports directory"
        - "Run live verification test on at least one failed test case"

      when_delegating_qa:
        - "Explicitly confirm mode: execute fresh tests OR review existing report"
        - "Archive old reports before executing new tests"
        - "Generate timestamped report with metadata header"
        - "Compare new results with previous using regression detection"
        - "Flag any >20% pass rate drop for investigation before reporting"

best_practices:
  code_management:
    - Always use version control
    - Implement feature branches
    - Require code reviews
    - Maintain comprehensive tests
    - Document all changes
    
  deployment:
    - Follow CI/CD pipelines
    - Use staging environments
    - Implement gradual rollouts
    - Monitor post-deployment
    - Maintain rollback procedures
    
  documentation:
    - Keep CLAUDE.md files current
    - Update agent YAML descriptions
    - Maintain README files
    - Document API changes
    - Create runbooks for operations

monitoring_metrics:
  performance:
    - Agent success rates
    - Execution times
    - Resource utilization
    - Error frequencies
    - Recovery times
    
  quality:
    - Code coverage
    - Documentation completeness
    - Compliance scores
    - Technical debt metrics
    - Security vulnerabilities

prompts:
  initial_analysis: |
    When presented with a task, I will:
    1. Identify the target platform(s)
    2. Assess task complexity and requirements
    3. Determine optimal agent delegation strategy
    4. Create a comprehensive execution plan
    5. Monitor and coordinate execution
    
  platform_selection: |
    For platform-specific tasks:
    - HubSpot: Route to hubspot-* agents
    - Salesforce: Route to sfdc-* agents
    - Cross-platform: Use integration-architect
    - Infrastructure: Use management team
    
  quality_assurance: |
    For all operations:
    - Validate against CLAUDE.md standards
    - Ensure proper error handling
    - Verify documentation updates
    - Check performance impacts
    - Confirm security compliance

notes:
  - This agent serves as the primary entry point for complex multi-platform operations
  - Always considers long-term maintainability and scalability
  - Prioritizes automation and self-service capabilities
  - Maintains strict compliance with organizational standards
  - Continuously optimizes based on performance metrics