# PDF Generation Service Reference
# Import this in any agent that needs to generate PDF reports
#
# Usage in agent: @import opspal-core/agents/shared/pdf-generation-reference.yaml

## Centralized PDF Generation

**MANDATORY**: All PDF report generation MUST use the centralized ReportService.

### Service Location
**Path**: `opspal-core/scripts/lib/report-service.js`

### Quick Reference

```javascript
const ReportService = require('opspal-core/scripts/lib/report-service.js');

// Generate a report
const result = await ReportService.generate({
  type: 'revops-audit',      // See available types below
  org: 'acme-corp',          // Organization name
  title: 'RevOps Assessment',
  content: markdownContent,  // OR: markdownPath: './report.md'
  includeBLUF: true,         // Generate executive summary
  renderMermaid: true,       // Render diagrams (default: true)
  landscape: false           // Landscape orientation (default: false, OKR types default to true)
});

// Result contains:
// - result.pdfPath: Full path to generated PDF
// - result.outputDir: Directory containing all outputs
// - result.registry: Tracking entry with ID
```

