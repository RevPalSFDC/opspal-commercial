### Multi-Document Collation

For reports with multiple sections:

```javascript
const result = await ReportService.generateCollated({
  type: 'revops-audit',
  org: 'acme-corp',
  title: 'Comprehensive RevOps Assessment',
  documents: [
    { path: './summary.md', title: 'Executive Summary', order: 0 },
    { path: './gtm-analysis.md', title: 'GTM Analysis', order: 1 },
    { path: './automation-review.md', title: 'Automation Review', order: 2 },
    { path: './recommendations.md', title: 'Recommendations', order: 3 }
  ]
});
```

### CLI Usage

```bash
# Generate report
node opspal-core/scripts/lib/report-service.js generate \
  --type revops-audit \
  --org acme-corp \
  --content ./report.md \
  --verbose

# List recent reports
node opspal-core/scripts/lib/report-service.js list --org acme-corp --limit 10

# View available types
node opspal-core/scripts/lib/report-service.js types
```

### Output Directory Structure

Reports are saved to standardized paths:
```
instances/
├── salesforce/
│   └── {org}/
│       └── reports/
│           └── {type}/
│               └── {date}/
│                   ├── report.pdf
│                   ├── report.md
│                   └── EXECUTIVE_SUMMARY.md
├── hubspot/
│   └── {org}/reports/{type}/{date}/
├── marketo/
│   └── {instance}/reports/{type}/{date}/
└── cross-platform/
    └── {org}/reports/{type}/{date}/
```

### Report Registry

All generated reports are tracked in `.report-registry.json`:

```javascript
// List reports for an org
const reports = ReportService.listReports({ org: 'acme-corp' });

// Get report by ID
const report = service.getReport('rpt_abc123_xyz');
```

### Integration with Content Generation

If using the developer-tools-plugin report_service for content:

```javascript
// Step 1: Generate content with report_service (developer-tools-plugin)
const ContentService = require('developer-tools-plugin/scripts/lib/report-service.js');
const contentService = new ContentService();
const content = await contentService.generateReport({
  report_type: 'assessment',
  audience: 'exec',
  // ... content options
});

// Step 2: Convert to PDF with ReportService (opspal-core)
const ReportService = require('opspal-core/scripts/lib/report-service.js');
const result = await ReportService.generate({
  type: 'revops-audit',
  org: 'acme-corp',
  title: 'RevOps Assessment',
  content: content.content,  // Use generated content
  includeBLUF: false         // Already included in content
});
```

### Features Included Automatically

- ✅ RevPal branding and logo
- ✅ Cover page with metadata
- ✅ Table of contents (auto-generated for 5+ headings)
- ✅ Header/footer with page numbers
- ✅ Mermaid diagram rendering
- ✅ Print-optimized styling
- ✅ Report registry tracking
- ✅ BLUF+4 executive summary (optional)
- ✅ Landscape orientation (per-type default or explicit override)
