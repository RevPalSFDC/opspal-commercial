# Sample Multi-Domain Task Fixture
# Used for testing Task Graph operations with cross-domain complexity

---
# Multi-domain task (Apex + Flow) - HIGH complexity, requires Task Graph
lead_routing_overhaul:
  request: "Update lead routing to add fallback owner and modify the associated trigger"
  expected_complexity:
    score: 6
    factors:
      - multi_domain: true  # Apex + Flow
      - multi_artifact: true  # 5+ files
      - high_risk: false
      - high_ambiguity: false
      - long_horizon: true
    recommendation: task_graph_required

  expected_task_graph:
    tasks:
      - id: T-01
        title: Flow Discovery
        domain: salesforce-flow
        dependencies: []
        can_run_in_parallel_with: [T-02, T-03]

      - id: T-02
        title: Apex Trigger Analysis
        domain: salesforce-apex
        dependencies: []
        can_run_in_parallel_with: [T-01, T-03]

      - id: T-03
        title: Requirements Specification
        domain: salesforce-flow
        dependencies: []
        can_run_in_parallel_with: [T-01, T-02]

      - id: T-04
        title: Flow XML Update
        domain: salesforce-flow
        dependencies: [T-01, T-03]
        can_run_in_parallel_with: []

      - id: T-05
        title: Trigger Handler Update
        domain: salesforce-apex
        dependencies: [T-02, T-03]
        can_run_in_parallel_with: [T-04]

      - id: T-06
        title: Integration Testing
        domain: salesforce-apex
        dependencies: [T-04, T-05]
        can_run_in_parallel_with: []

      - id: T-07
        title: Sandbox Deployment
        domain: salesforce-metadata
        dependencies: [T-06]
        can_run_in_parallel_with: []

      - id: T-08
        title: Code Review
        domain: salesforce-apex
        dependencies: [T-04, T-05]
        can_run_in_parallel_with: [T-07]

    expected_waves:
      - wave: 1
        tasks: [T-01, T-02, T-03]
        parallel: true
      - wave: 2
        tasks: [T-04, T-05]
        parallel: true
      - wave: 3
        tasks: [T-06, T-07, T-08]
        parallel: false  # T-06 blocks T-07

---
# Cross-platform task (Salesforce + HubSpot) - VERY HIGH complexity
sf_hubspot_sync:
  request: "Implement bidirectional lead sync between Salesforce and HubSpot with field mapping"
  expected_complexity:
    score: 8
    factors:
      - multi_domain: true  # SF + HS
      - multi_artifact: true  # Many files
      - high_risk: true  # Data sync
      - high_ambiguity: true  # Needs discovery
      - long_horizon: true  # Multi-step
    recommendation: task_graph_required

  expected_task_graph:
    tasks:
      - id: T-01
        title: Salesforce Field Discovery
        domain: salesforce-data
        dependencies: []
        can_run_in_parallel_with: [T-02]

      - id: T-02
        title: HubSpot Property Discovery
        domain: hubspot-data
        dependencies: []
        can_run_in_parallel_with: [T-01]

      - id: T-03
        title: Field Mapping Specification
        domain: cross-platform
        dependencies: [T-01, T-02]
        can_run_in_parallel_with: []

      - id: T-04
        title: Salesforce Outbound Configuration
        domain: salesforce-data
        dependencies: [T-03]
        can_run_in_parallel_with: [T-05]

      - id: T-05
        title: HubSpot Webhook Setup
        domain: hubspot-workflow
        dependencies: [T-03]
        can_run_in_parallel_with: [T-04]

      - id: T-06
        title: Sync Logic Implementation
        domain: integration
        dependencies: [T-04, T-05]
        can_run_in_parallel_with: []

      - id: T-07
        title: Sample Data Test
        domain: cross-platform
        dependencies: [T-06]
        can_run_in_parallel_with: []

      - id: T-08
        title: Full Validation
        domain: cross-platform
        dependencies: [T-07]
        can_run_in_parallel_with: []

      - id: T-09
        title: Documentation
        domain: cross-platform
        dependencies: [T-06]
        can_run_in_parallel_with: [T-07, T-08]

    expected_waves:
      - wave: 1
        tasks: [T-01, T-02]
        parallel: true
      - wave: 2
        tasks: [T-03]
        parallel: false
      - wave: 3
        tasks: [T-04, T-05]
        parallel: true
      - wave: 4
        tasks: [T-06, T-09]
        parallel: true  # Docs can start
      - wave: 5
        tasks: [T-07]
        parallel: false
      - wave: 6
        tasks: [T-08]
        parallel: false

---
# Production deployment - CRITICAL risk
production_deployment:
  request: "Deploy the new CPQ pricing rules to production with full validation"
  expected_complexity:
    score: 7
    factors:
      - multi_domain: true  # Metadata + Data
      - multi_artifact: true  # Multiple components
      - high_risk: true  # Production
      - high_ambiguity: false
      - long_horizon: true
    recommendation: task_graph_required

  expected_task_graph:
    tasks:
      - id: T-01
        title: Pre-deployment Backup
        domain: salesforce-data
        dependencies: []
        risk_level: low

      - id: T-02
        title: Change Record Creation
        domain: salesforce-metadata
        dependencies: []
        risk_level: low

      - id: T-03
        title: Validation Deploy
        domain: salesforce-metadata
        dependencies: [T-01, T-02]
        risk_level: medium

      - id: T-04
        title: User Approval Gate
        domain: salesforce-metadata
        dependencies: [T-03]
        risk_level: low
        stop_points:
          - Requires explicit user approval

      - id: T-05
        title: Execute Deployment
        domain: salesforce-metadata
        dependencies: [T-04]
        risk_level: critical
        tool_policy:
          production_ops: allowed_with_approval

      - id: T-06
        title: Smoke Testing
        domain: salesforce-data
        dependencies: [T-05]
        risk_level: medium

      - id: T-07
        title: Rollback Task (On Failure)
        domain: salesforce-metadata
        dependencies: [T-05]
        risk_level: critical
        trigger: on_failure

      - id: T-08
        title: Post-deployment Validation
        domain: salesforce-data
        dependencies: [T-06]
        risk_level: low

      - id: T-09
        title: Change Record Closure
        domain: salesforce-metadata
        dependencies: [T-08]
        risk_level: low

---
# Simple single-domain task for comparison (should NOT trigger Task Graph)
simple_field_addition:
  request: "Add a new checkbox field to Account object"
  expected_complexity:
    score: 1
    factors:
      - multi_domain: false
      - multi_artifact: false
      - high_risk: false
      - high_ambiguity: false
      - long_horizon: false
    recommendation: direct_execution

  expected_action: "Direct delegation to sfdc-metadata-manager, no Task Graph needed"

---
# User flag override tests
flag_overrides:
  force_sequential:
    request: "[SEQUENTIAL] Add a text field to Contact"
    expected:
      score: 10  # Forced by flag
      recommendation: task_graph_required

  force_direct:
    request: "[DIRECT] Migrate all custom objects to new namespace"
    expected:
      score: 0  # Forced by flag
      recommendation: direct_execution
      warning: "High-risk task with [DIRECT] flag - proceed with caution"

  complex_hint:
    request: "[COMPLEX] Update a picklist value"
    expected:
      base_score: 1
      adjusted_score: 3  # +2 from flag
      recommendation: direct_execution  # Still below threshold

---
# Circular dependency detection (should fail validation)
invalid_circular_graph:
  tasks:
    - id: T-01
      title: Task A
      dependencies: [T-03]  # Creates cycle

    - id: T-02
      title: Task B
      dependencies: [T-01]

    - id: T-03
      title: Task C
      dependencies: [T-02]  # T-01 -> T-03 -> T-02 -> T-01 (cycle!)

  expected_validation:
    valid: false
    error: "Circular dependency detected: T-01 -> T-03 -> T-02 -> T-01"
