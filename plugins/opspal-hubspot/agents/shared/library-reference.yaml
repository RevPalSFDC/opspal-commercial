# HubSpot Plugin - Shared Library Reference
# Version: 1.1.0
# Last Updated: 2026-03-30
#
# This file documents commonly used scripts available to all HubSpot agents.
# All paths relative to: .claude-plugins/opspal-hubspot/scripts/lib/

---

# Data Operations
data:
  company_fetcher:
    path: hubspot-company-fetcher.js
    purpose: Fetch associated company records for contacts
    capabilities:
      - Caching to avoid repeat API calls
      - Handles multiple company associations
      - Network retry logic for resilience
      - Fail-fast error handling (No-Mocks compliant)
    usage: |
      const HubSpotCompanyFetcher = require('./hubspot-company-fetcher');
      const fetcher = new HubSpotCompanyFetcher({ enableCache: true });
      const companies = await fetcher.fetchAssociatedCompanies(contactId);

  data_operations:
    path: hubspot-data-operations-manager.js
    purpose: Bulk data operations with validation
    capabilities:
      - Large-scale data imports/updates
      - Validation and quality checks
      - Error handling and rollback
    usage: "node hubspot-data-operations-manager.js --operation upsert --object contacts --file data.csv"

  imports_api:
    path: imports-api-wrapper.js
    purpose: Advanced CRM Imports V3 API with multi-file support
    capabilities:
      - Single and multi-file imports with associations
      - Marketing contact flag during import
      - Auto-create static lists from imports
      - Column mapping and date format control
      - Error retrieval for failed rows
    usage: |
      const { HubSpotImporter } = require('./imports-api-wrapper');
      const importer = new HubSpotImporter(apiKey);
      await importer.importRecordsAdvanced({
        objectType: 'contacts',
        records: data,
        mode: 'UPSERT',
        marketableContactImport: true,
        createContactListFromImport: true
      });
    added: v3.6.0

# Workflow Management
workflows:
  workflow_builder:
    path: hubspot-workflow-builder.js
    purpose: Create and manage HubSpot workflows
    capabilities:
      - Workflow creation from templates
      - Trigger configuration
      - Action definition
    usage: "node hubspot-workflow-builder.js --create --template lead-nurture --portal myPortal"

  automation_actions:
    path: automation-actions-v4-wrapper.js
    purpose: Custom workflow actions via Automation Actions V4 API
    capabilities:
      - Custom action definitions for workflow editor
      - Action functions (PRE_ACTION_EXECUTION, PRE_FETCH_OPTIONS, POST_FETCH_OPTIONS)
      - External options fetching (dynamic dropdowns)
      - Async execution with BLOCK state
      - Multi-language label support (14 languages)
    usage: |
      const AutomationActionsV4Wrapper = require('./automation-actions-v4-wrapper');
      const wrapper = new AutomationActionsV4Wrapper(accessToken, appId);
      const action = await wrapper.createAction({
        actionUrl: 'https://your-service.com/webhook',
        objectTypes: ['CONTACT', 'DEAL'],
        inputFields: [{ name: 'email', type: 'string', required: true }],
        labels: { en: { actionName: 'My Action' } }
      });
    added: v3.6.0

  callback_manager:
    path: callback-state-manager.js
    purpose: Manage async workflow callback completion
    capabilities:
      - Register callbacks from webhook payloads
      - Complete callbacks with output fields
      - Expiration duration management
    usage: |
      const CallbackStateManager = require('./callback-state-manager');
      const manager = new CallbackStateManager({ accessToken });
      await manager.completeCallback('callback-123', { status: 'success' });
    added: v3.6.0

# Rate Limiting & API Safety
rate_limiting:
  request_throttle:
    path: hubspot-request-throttle.js
    purpose: Centralized request coordination (singleton) for all API calls
    capabilities:
      - Global request coordination across all batch wrappers
      - Adaptive throttling from response headers
      - Circuit breaker (opens after 3 consecutive 429s, recovers after 60s)
      - Tier detection from response headers
      - Priority queue for high-priority requests
    usage: |
      const { getThrottle, throttledFetch } = require('./hubspot-request-throttle');
      const throttle = getThrottle({ tier: 'starter', verbose: true });
      const response = await throttle.enqueue(() => fetch(url, options));
    added: v3.5.0

  rate_limit_parser:
    path: hubspot-rate-limit-parser.js
    purpose: Parse HubSpot rate limit response headers
    capabilities:
      - Parses X-HubSpot-RateLimit-Max, Remaining, Daily, Daily-Remaining
      - Parses Retry-After on 429 responses
      - Tier-aware limit detection
    usage: "Internal — consumed by hubspot-request-throttle.js"
    added: v3.5.0

  api_safeguard:
    path: hubspot-api-safeguard.js
    purpose: Tier-aware rate limits with exponential backoff
    capabilities:
      - Per-tier limit enforcement (Free 100, Pro 190, Enterprise 190, OAuth 110 per 10s)
      - Exponential backoff on 429 errors
      - Daily limit tracking
    usage: |
      const HubSpotAPISafeguard = require('./hubspot-api-safeguard');
      const safeguard = new HubSpotAPISafeguard({ tier: 'professional' });
    added: v3.5.0

