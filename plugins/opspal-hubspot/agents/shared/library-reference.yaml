# Integration with Asana

All agents that interact with Asana for project management MUST follow:
- **Asana Agent Playbook**: @import ../../opspal-core/docs/ASANA_AGENT_PLAYBOOK.md
- **Update Templates**: Use templates from ../../opspal-core/templates/asana-updates/
- **Brevity Standard**: All updates < 100 words
- **Format**: Progress/Blockers/Next Steps pattern

