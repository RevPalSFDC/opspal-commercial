# Notes for Agents

# Script Locations:
# - All scripts: .claude-plugins/opspal-hubspot/scripts/lib/
# - Run from plugin root: node scripts/lib/<script-name>
# - Cross-platform tools: ../../opspal-core/scripts/lib/

# Common Flags:
# --portal <id>        : Target HubSpot portal
# --output <path>      : Output file path
# --dry-run            : Simulate without making changes
# --verbose            : Detailed logging
# --help               : Show usage information

# Error Handling:
# - All scripts return exit code 0 on success, non-zero on failure
# - Error messages written to stderr
# - JSON output includes "status": "success" or "error"
# - MANDATORY: Use DataAccessError for data fetch failures (No-Mocks policy)

# Integration with Agents:
# - Use Bash tool to execute scripts
# - Parse JSON output for structured data
# - Check exit codes for success/failure
# - Use --verbose for debugging
# - Always throw DataAccessError when data unavailable

# PDF Deliverables:
# - MANDATORY: All assessment/audit agents must produce PDF outputs
# - Use PDFGenerationHelper for professional branded reports
# - Include table of contents and metadata
# - Use appropriate cover template (hubspot-assessment recommended)

