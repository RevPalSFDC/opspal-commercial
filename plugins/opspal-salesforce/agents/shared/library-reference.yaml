# Notes for Agents

# Script Locations:
# - All scripts: ${CLAUDE_PLUGIN_ROOT}/scripts/lib/
# - Run from plugin root: node scripts/lib/<script-name>
# - Run from lib directory: node <script-name>

# Common Flags:
# --org <alias>        : Target Salesforce org
# --output <path>      : Output file path
# --dry-run            : Simulate without making changes
# --verbose            : Detailed logging
# --help               : Show usage information

# Error Handling:
# - All scripts return exit code 0 on success, non-zero on failure
# - Error messages written to stderr
# - JSON output includes "status": "success" or "error"

# Integration with Agents:
# - Use Bash tool to execute scripts
# - Parse JSON output for structured data
# - Check exit codes for success/failure
# - Use --verbose for debugging

# Living Runbook Integration:
# - Always load runbook context before major operations
# - node runbook-context-extractor.js <org> --operation-type <type>
# - Operation types: permission, metadata, automation, data, cpq

# Permission Set Operations:
# - DISCOVERY: Always start with discovery to understand fragmentation
# - ANALYSIS: Deep-dive into specific initiatives
# - PLANNING: Generate migration plans with rollback
# - EXECUTION: Execute with --dry-run first, then production
# - REPORTING: Generate stakeholder-ready markdown reports

