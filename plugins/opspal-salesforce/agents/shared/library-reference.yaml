# Error Handling & Logging
utilities:
  error_logger:
    path: audit-error-logger.js
    purpose: Structured error logging
    capabilities:
      - Error categorization
      - Stack trace capture
      - Recovery suggestions
    usage: "node audit-error-logger.js --log-file errors.json"

  validation_framework:
    path: validation-framework.js
    purpose: Reusable validation patterns
    capabilities:
      - Schema validation
      - Business rule validation
      - Custom validators
    usage: "Imported as library: const { validate } = require('./validation-framework')"

  data_access_error:
    path: ../../../opspal-core/scripts/lib/data-access-error.js
    purpose: |
      **CRITICAL - No-Mocks Policy Enforcement**: Fail-fast error class for data access failures.
      MANDATORY for all data query/fetch operations to prevent silent failures and empty array returns.
    capabilities:
      - Explicit error throwing when data unavailable
      - Structured error context with source, message, and metadata
      - Prevents misleading empty returns
      - Security: Blocks unimplemented features from returning fake data
    usage: |
      const { DataAccessError } = require('../../../opspal-core/scripts/lib/data-access-error');

      // Throw when data unavailable
      if (!response.ok) {
        throw new DataAccessError(
          'Salesforce_API',
          'Failed to fetch records',
          {
            endpoint: '/query',
            statusCode: response.status,
            workaround: 'Check org permissions'
          }
        );
      }

      // Throw for unimplemented features
      throw new DataAccessError(
        'Feature_Name',
        'Feature not yet implemented',
        {
          status: 'not_implemented',
          tracking_issue: 'https://github.com/.../issues/123'
        }
      );
    mandatory_for:
      - All agents that query Salesforce data
      - All agents that fetch external data
      - All unimplemented data retrieval methods
    added: v3.41.0 (Phase 1-4 No-Mocks enforcement)

  deployment_source_validator:
    path: deployment-source-validator.js
    purpose: |
      **Prevents ComponentSetError**: Validates deployment sources before executing sf CLI deploy commands.
      Prevents "No source-backed components present in the package" errors (100% prevention rate).
    capabilities:
      - Validates source directories exist and contain metadata
      - Validates package.xml references valid files
      - Checks metadata type formatting
      - Verifies Salesforce project config (sfdx-project.json) exists
      - Provides clear guidance for missing components
    usage: |
      const validator = require('./deployment-source-validator');
      await validator.validateSourceDir('./force-app');
      await validator.validateManifest('./package.xml');
      await validator.validateMetadata('ApexClass:MyClass', orgAlias);
    mandatory_for:
      - Deployment agents (sfdc-deployment-manager, sfdc-metadata-manager)
      - Metadata agents performing deployments
      - CI/CD automation agents
    prevention_rate: "100% of ComponentSetError failures"
    added: v3.41.0 (Phase 3 validation tool wiring)

  bulk_operation_validator:
    path: bulk-operation-validator.js
    purpose: |
      **Pre-validates bulk operations**: Checks data, limits, and org state before executing bulk DML.
      Prevents governor limit errors, data quality issues, and partial failures.
    capabilities:
      - Validates record count against org limits
      - Checks required fields present in data
      - Validates field types and formats
      - Estimates DML statement usage
      - Checks org storage limits
    usage: |
      const validator = require('./bulk-operation-validator');
      const result = await validator.validateBulkInsert({
        objectType: 'Account',
        records: accountData,
        orgAlias: 'myorg'
      });
      if (!result.valid) {
        console.error('Validation failed:', result.errors);
      }
    mandatory_for:
      - Bulk data operation agents
      - Import/migration agents
      - Data quality agents
    prevention_rate: "80% of bulk operation failures"
    added: v3.41.0 (Phase 3 validation tool wiring)

  org_context_validator:
    path: org-context-validator.js
    purpose: |
      **Validates org state before operations**: Ensures org has required features, objects, fields, and permissions.
      Prevents "object not found", "field does not exist", and permission errors.
    capabilities:
      - Validates objects exist in org
      - Checks fields exist and are accessible
      - Verifies features are enabled (CPQ, FSL, etc.)
      - Validates user permissions
      - Checks org edition and licenses
    usage: |
      const validator = require('./org-context-validator');
      await validator.validateContext({
        orgAlias: 'myorg',
        requiredObjects: ['SBQQ__Quote__c', 'SBQQ__QuoteLine__c'],
        requiredFields: ['Account.AnnualRevenue', 'Contact.Email'],
        requiredFeatures: ['CPQ']
      });
    mandatory_for:
      - Orchestrator agents
      - CPQ/FSL feature-specific agents
      - Cross-org migration agents
    prevention_rate: "90% of 'not found' errors"
    added: v3.41.0 (Phase 3 validation tool wiring)

  post_field_deployment_validator:
    path: post-field-deployment-validator.js
    purpose: |
      **Verifies field deployments succeeded**: Validates fields were created correctly with all attributes.
      Catches silent deployment failures and attribute mismatches.
    capabilities:
      - Verifies field existence post-deployment
      - Validates field types match specification
      - Checks required field attributes (length, precision, etc.)
      - Validates picklist values created
      - Checks field-level security applied
    usage: |
      const validator = require('./post-field-deployment-validator');
      await validator.validateFieldDeployment({
        orgAlias: 'myorg',
        objectName: 'Account',
        fieldName: 'CustomField__c',
        expectedType: 'Text',
        expectedLength: 255
      });
    mandatory_for:
      - Field creation/modification agents
      - Metadata deployment agents
      - Schema migration agents
    prevention_rate: "95% of silent field deployment failures"
    added: v3.41.0 (Phase 3 validation tool wiring)

  flow_decision_logic_analyzer:
    path: flow-decision-logic-analyzer.js
    purpose: |
      **Analyzes flow decision logic for correctness**: Validates decision criteria, detects unreachable paths.
      Prevents flow runtime failures from logic errors.
    capabilities:
      - Validates decision criteria syntax
      - Detects unreachable flow paths
      - Checks for missing default outcomes
      - Analyzes formula expressions in decisions
      - Validates field references in conditions
    usage: |
      const analyzer = require('./flow-decision-logic-analyzer');
      const analysis = await analyzer.analyzeFlow({
        orgAlias: 'myorg',
        flowApiName: 'Account_Status_Update',
        includeRecommendations: true
      });
      console.log('Issues found:', analysis.issues);
    mandatory_for:
      - Flow creation/modification agents
      - Automation audit agents
      - Flow optimization agents
    prevention_rate: "70% of flow runtime logic errors"
    added: v3.41.0 (Phase 3 validation tool wiring)

  business_process_coverage_tracker:
    path: ../../../opspal-core/scripts/lib/business-process-coverage-tracker.js
    purpose: |
      **Tracks business process test coverage ($6K ROI)**: Identifies untested business scenarios with coverage heatmaps.
      Links tests to processes (Lead-to-Cash, Quote-to-Order, etc.) and calculates coverage percentages.
    capabilities:
      - Track coverage by business process
      - Identify untested scenarios
      - Generate coverage heatmaps
      - Link tests to business processes
      - Calculate coverage percentages
      - Export coverage reports
    usage: |
      const { BusinessProcessCoverageTracker } = require('../../../opspal-core/scripts/lib/business-process-coverage-tracker');
      const tracker = new BusinessProcessCoverageTracker({ dbPath: './coverage.db' });
      await tracker.recordCoverage('Lead-to-Cash', 'Lead Creation', 'automated', 'passed');
      const heatmap = await tracker.generateHeatmap('Lead-to-Cash');
      console.log('Coverage:', heatmap.coveragePercentage + '%');
    mandatory_for:
      - QA/testing agents
      - Assessment agents
      - RevOps audit agents
      - CPQ assessment agents
    roi_metrics:
      annual_value: "$6,000"
      time_saved: "40 hours/year"
      prevents: "Business process test gaps"
    added: v3.41.0 (Phase 4 high-ROI tool wiring)

  user_expectation_tracker:
    path: ../../../opspal-core/scripts/lib/user-expectation-tracker.js
    purpose: |
      **Tracks user expectations vs reality ($36K ROI)**: Records what users expect vs what happens.
      Identifies expectation gaps, prioritizes fixes, and measures satisfaction delta.
    capabilities:
      - Record user expectations
      - Track actual outcomes
      - Calculate expectation gaps
      - Prioritize fixes by impact
      - Measure satisfaction delta
      - Generate gap analysis reports
    usage: |
      const { UserExpectationTracker } = require('../../../opspal-core/scripts/lib/user-expectation-tracker');
      const tracker = new UserExpectationTracker({ dbPath: './expectations.db' });
      await tracker.recordExpectation({
        feature: 'Quote Generation',
        userExpectation: 'Instant quote creation',
        actualOutcome: '30-second delay',
        satisfactionScore: 3,
        impactLevel: 'high'
      });
      const gaps = await tracker.getTopGaps();
      console.log('Top gaps:', gaps);
    mandatory_for:
      - Assessment agents
      - User research agents
      - Product feedback agents
      - RevOps/CPQ audit agents
    roi_metrics:
      annual_value: "$36,000"
      time_saved: "240 hours/year"
      prevents: "User expectation mismatches"
    added: v3.41.0 (Phase 4 high-ROI tool wiring)

  business_process_classifier:
    path: business-process-classifier.js
    purpose: |
      **Classifies records by business process**: Automatically tags records with process (Lead-to-Cash, Quote-to-Order).
      Enables process-level reporting and analysis.
    capabilities:
      - Classify records by process
      - Tag opportunities, quotes, cases by process
      - Enable process-level reporting
      - Support multi-process records
      - Generate process distribution reports
    usage: |
      const classifier = require('./business-process-classifier');
      const process = await classifier.classifyOpportunity({
        orgAlias: 'myorg',
        opportunityId: '006...',
        includeSubProcesses: true
      });
      console.log('Process:', process); // e.g., "Lead-to-Cash"
    mandatory_for:
      - Assessment agents
      - RevOps audit agents
      - Reporting agents
      - Analytics agents
    added: v3.41.0 (Phase 4 high-ROI tool wiring)

# Project Management & Collaboration
asana_integration:
  task_reader:
    path: ../../../opspal-core/scripts/lib/asana-task-reader.js
    purpose: |
      **Reads and parses Asana tasks**: Extracts structured fields, description, dependencies for agent context.
      Enables agents to understand what work is assigned to them.
    capabilities:
      - Parse task structured fields (name, status, assignee, due date, priority)
      - Extract custom fields and tags
      - Read task description and comments
      - Get project context
      - Identify dependencies (blocking/blocked tasks)
      - Map parent-child relationships
    usage: |
      const { asanaTaskReader } = require('../../../opspal-core/scripts/lib/asana-task-reader');
      const taskContext = await asanaTaskReader.parseTask(taskId, {
        includeComments: true,
        includeProject: true,
        includeDependencies: true
      });
      console.log('Task:', taskContext.name);
      console.log('Status:', taskContext.status);
    mandatory_for:
      - Long-running operation agents (assessments, audits, migrations)
      - Orchestrator agents
      - Agents that work on multi-step projects
    playbook: "../../../opspal-core/docs/ASANA_AGENT_PLAYBOOK.md"
    added: v3.41.0 (Phase 5 Asana integration)

  update_formatter:
    path: ../../../opspal-core/scripts/lib/asana-update-formatter.js
    purpose: |
      **Formats Asana updates with brevity validation**: Ensures updates are succinct, actionable, and structured.
      Validates word count, includes metrics, and follows templates.
    capabilities:
      - Format progress updates (< 100 words)
      - Format blocker updates (< 80 words)
      - Format completion updates (< 150 words)
      - Validate brevity requirements
      - Include concrete metrics
      - Follow structured templates
    usage: |
      const formatter = require('../../../opspal-core/scripts/lib/asana-update-formatter');
      const update = formatter.formatProgressUpdate({
        taskName: 'Salesforce Field Cleanup',
        completed: ['Account object analyzed (350 fields)', 'Found 52 unused fields (15%)'],
        inProgress: ['Analyzing Opportunity object (2 hours remaining)'],
        next: ['Complete analysis', 'Generate deprecation plan'],
        status: 'On Track'
      });
      console.log(update); // Formatted, validated update ready for posting
    templates:
      - progress-update.md (50-75 words)
      - blocker-update.md (40-60 words)
      - completion-update.md (60-100 words)
      - milestone-update.md (100-150 words)
    template_location: "../../../opspal-core/templates/asana-updates/"
    mandatory_for:
      - All agents posting Asana updates
      - Assessment/audit agents
      - Long-running operation agents
    added: v3.41.0 (Phase 5 Asana integration)

  comment_manager:
    path: ../../../opspal-core/scripts/lib/asana-comment-manager.js
    purpose: |
      **Manages Asana comments**: Posts structured comments for progress, blockers, and completions.
      Handles tagging, formatting, and comment threading.
    capabilities:
      - Post progress comments
      - Post blocker alerts
      - Post completion summaries
      - Tag users (@mentions)
      - Thread comments on existing updates
      - Format with templates
    usage: |
      const commentMgr = require('../../../opspal-core/scripts/lib/asana-comment-manager');
      await commentMgr.postProgress(taskId, {
        completed: ['Analysis complete'],
        inProgress: ['Implementing fixes'],
        status: 'On Track'
      });
    mandatory_for:
      - Agents posting narrative updates
      - Orchestrator agents
      - Long-running agents
    added: v3.41.0 (Phase 5 Asana integration)

  roadmap_manager:
    path: ../../../opspal-core/scripts/lib/asana-roadmap-manager.js
    purpose: |
      **Breaks projects into tracked subtasks**: Creates Asana subtasks from multi-step work.
      Enables checkpoint updates and progress tracking.
    capabilities:
      - Break complex work into subtasks
      - Create subtasks in Asana
      - Set estimates and dependencies
      - Track progress across subtasks
      - Update parent task progress
    usage: |
      const roadmapMgr = require('../../../opspal-core/scripts/lib/asana-roadmap-manager');
      await roadmapMgr.createRoadmap(parentTaskId, [
        { name: 'Analyze org state', estimate: '2 hours' },
        { name: 'Design fixes', estimate: '3 hours' },
        { name: 'Implement changes', estimate: '4 hours' }
      ]);
    mandatory_for:
      - Agents with multi-step work
      - Assessment agents
      - Migration agents
    added: v3.41.0 (Phase 5 Asana integration)

  playbook:
    path: ../../../opspal-core/docs/ASANA_AGENT_PLAYBOOK.md
    purpose: |
      **Complete Asana integration guide for agents**: Standards for reading tasks, tracking progress, and writing updates.
      Ensures consistent, high-quality communication across 100+ agents.
    core_principles:
      - Context-Aware: Pull full task and project context
      - Succinct: Updates < 100 words with maximum signal
      - Actionable: Drive projects forward or flag blockers
      - Data-Driven: Include concrete metrics
      - Structured: Consistent formatting for scanning
      - Accountable: Clear ownership via assignments
    key_sections:
      - Reading and Understanding Tasks & Projects
      - Update Templates (progress, blocker, completion, milestone)
      - Brevity Requirements (strict word limits)
      - Project-as-Roadmap Pattern
      - Writing Back to Asana (comments, custom fields, status)
      - Platform-Specific Integration (Salesforce, HubSpot examples)
    mandatory_for:
      - All agents creating or updating Asana tasks
      - Assessment/audit agents
      - Long-running operation agents
      - Orchestrator agents
    version: "2.0.0"
    added: v3.41.0 (Phase 5 Asana integration)

# Monitoring & Improvement
monitoring:
  tool_usage_monitor:
    path: tool-usage-monitor.js
    purpose: |
      **Tracks which tools are actually used by agents**: Identifies adoption rates, most/least used tools,
      and tools needing better documentation or deprecation.
    capabilities:
      - Record tool usage with status (success/failure)
      - Track usage by agent
      - Calculate adoption rates
      - Identify unused tools
      - Generate usage reports
      - Monitor tool performance
    usage: |
      const ToolUsageMonitor = require('./tool-usage-monitor');
      const monitor = new ToolUsageMonitor({ dbPath: './tool-usage.db' });
      await monitor.initialize();

      // Record usage
      await monitor.recordUsage('DataAccessError', 'sfdc-cpq-assessor', 'success', {
        durationMs: 150
      });

      // Get statistics
      const stats = await monitor.getUsageStats();
      const report = await monitor.generateReport();
    cli_commands:
      - "node tool-usage-monitor.js report - Generate full usage report"
      - "node tool-usage-monitor.js stats - Show usage statistics"
      - "node tool-usage-monitor.js recent [days] - Show recent usage"
    benefits:
      - Data-driven decisions about tool improvements
      - Identify underutilized tools for deprecation
      - Measure tool adoption success
      - Prioritize documentation improvements
    added: v3.41.0 (Optional enhancements - monitoring)

  agent_feedback_collector:
    path: agent-feedback-collector.js
    purpose: |
      **Collects structured feedback from agents**: Enables data-driven improvements to tools,
      documentation, and agent experience.
    capabilities:
      - Submit feedback with 1-5 ratings
      - Categorize feedback (documentation, usability, performance, bug, feature_request)
      - Track improvement suggestions
      - Identify tools needing attention
      - Generate feedback reports
      - Monitor issue resolution
    usage: |
      const AgentFeedbackCollector = require('./agent-feedback-collector');
      const collector = new AgentFeedbackCollector({ dbPath: './feedback.db' });
      await collector.initialize();

      // Submit feedback
      await collector.submitFeedback({
        agentName: 'sfdc-cpq-assessor',
        toolName: 'DataAccessError',
        rating: 5,
        category: 'documentation',
        feedbackText: 'Clear examples, easy to implement',
        improvementSuggestion: 'Add more error recovery patterns'
      });

      // Get reports
      const toolsNeedingAttention = await collector.getToolsNeedingAttention();
      const featureRequests = await collector.getFeatureRequests();
    feedback_categories:
      - documentation: "Feedback on examples, clarity, completeness"
      - usability: "Ease of use, API design, workflow"
      - performance: "Speed, efficiency, resource usage"
      - bug: "Reported bugs or unexpected behavior"
      - feature_request: "Suggestions for new capabilities"
    cli_commands:
      - "node agent-feedback-collector.js report - Full feedback report"
      - "node agent-feedback-collector.js attention - Tools needing attention"
      - "node agent-feedback-collector.js features - Feature requests"
      - "node agent-feedback-collector.js docs - Documentation issues"
    benefits:
      - Continuous improvement based on actual agent experience
      - Prioritize fixes by severity and frequency
      - Track feedback resolution
      - Identify documentation gaps
    added: v3.41.0 (Optional enhancements - feedback)

  usage_examples:
    path: ../../docs/TOOL_USAGE_EXAMPLES.md
    purpose: |
      **Real-world examples of using wired tools**: Comprehensive guide showing how agents should use
      tools, playbooks, and frameworks with concrete code examples.
    sections:
      - DataAccessError examples (fail-fast patterns, unimplemented features)
      - PDF generation examples (single reports, multi-document compilation)
      - Validation tool examples (pre-deployment, bulk operations)
      - High-ROI tracker examples (coverage tracking, expectation gaps)
      - Playbook integration examples (picklist dependencies, quality gates)
      - Asana integration examples (reading tasks, posting updates)
      - Complete workflow examples (end-to-end assessment workflows)
    example_count: "11 complete examples with 30+ code snippets"
    benefits:
      - Copy-paste ready code for common patterns
      - Best practices and anti-patterns
      - Complete workflow demonstrations
      - Reduces learning curve for new agents
    added: v3.41.0 (Optional enhancements - documentation)

