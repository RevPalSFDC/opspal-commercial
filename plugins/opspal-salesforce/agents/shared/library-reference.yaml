# Common Patterns

# Pattern 1: Org Discovery + Analysis
#   1. node state-discovery-orchestrator.js --org myOrg
#   2. node permission-set-discovery.js --org myOrg
#   3. node automation-audit-v2-orchestrator.js --org myOrg

# Pattern 2: Permission Set Consolidation
#   1. node permission-set-discovery.js --org myOrg
#   2. node permission-set-analyzer.js --org myOrg --initiative CPQ
#   3. node permission-set-migration-planner.js --org myOrg --initiative CPQ
#   4. node permission-set-report-generator.js all discovery.json analysis.json plan.json ./reports/
#   5. node permission-set-cli.js --execute-migration plan.json --org myOrg --dry-run

# Pattern 3: Metadata Deployment
#   1. node metadata-deployment-validator.js --org myOrg --package-xml package.xml
#   2. sf project deploy start --source-dir force-app
#   3. node permission-set-cli.js --input permissions.json --org myOrg

# Pattern 4: Automation Audit
#   1. node automation-audit-v2-orchestrator.js --org myOrg
#   2. node automation-conflict-engine.js --org myOrg
#   3. node automation-dependency-graph.js --org myOrg
#   4. node automation-dashboard-generator.js --input results.json

