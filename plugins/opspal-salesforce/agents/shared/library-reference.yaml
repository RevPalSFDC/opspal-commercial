# Salesforce Plugin - Shared Library Reference
# Version: 1.0.0
# Last Updated: 2025-10-22
#
# This file documents commonly used scripts available to all agents.
# All paths relative to: ${CLAUDE_PLUGIN_ROOT}/scripts/lib/

---

# Bulk Operations Engine (v3.74.0)
bulk_operations:
  engine:
    path: bulkops-engine.js
    purpose: Core engine for batched DML with parallel validation and retry
    capabilities:
      - Batched execution (configurable batch size, default 200)
      - Checkpoint-based resume for interrupted operations
      - Parallel validation via read-only sub-agent
      - Retry queue with error categorization
      - Dry-run mode for pre-flight validation
    usage: "Invoked via sfdc-bulkops-orchestrator agent"
    added: v3.74.0

  checkpoint_manager:
    path: bulkops-checkpoint-manager.js
    purpose: Checkpoint creation, resumption, and operation tracking
    capabilities:
      - Create/update/complete/fail checkpoints
      - Resume interrupted operations from last batch
      - List and filter operations by status
    usage: "node bulkops-checkpoint-manager.js list [status]"
    added: v3.74.0

  audit_logger:
    path: bulkops-audit-logger.js
    purpose: JSONL per-record audit trail with error categorization
    capabilities:
      - Per-record success/failure logging
      - Error categorization (validation_rule, FLS, governor_limit, etc.)
      - Batch completion tracking
      - Error summary generation
    usage: "node bulkops-audit-logger.js summary <operationId>"
    added: v3.74.0

  diff_tracker:
    path: bulkops-diff-tracker.js
    purpose: Before/after value capture for rollback and diff reporting
    capabilities:
      - Before-state capture pre-DML
      - After-state recording post-DML
      - Diff summary with changed fields
      - Rollback data generation
    usage: "node bulkops-diff-tracker.js summary <operationId>"
    added: v3.74.0

# Permission Set Management (v3.32.0 - v3.34.0)
permission_sets:
  orchestrator:
    path: permission-set-orchestrator.js
    purpose: Core engine for centralized permission set management
    capabilities:
      - Two-tier architecture (Users/Admin)
      - Merge-safe accretive operations
      - Idempotent deployments with SHA-256 hashing
      - No-downgrade policy enforcement
    usage: "node permission-set-orchestrator.js --input config.json --org myOrg"

  cli:
    path: permission-set-cli.js
    purpose: CLI interface for permission management
    capabilities:
      - JSON input configuration
      - Dry-run mode
      - Migration plan execution
      - Verbose output
    usage: "node permission-set-cli.js --input config.json --org myOrg [--dry-run] [--execute-migration plan.json]"

  discovery:
    path: permission-set-discovery.js
    purpose: Scan org for fragmented permission sets
    capabilities:
      - Pattern detection (phased, tiered, versioned, dated)
      - Fragmentation scoring (0-100)
      - Initiative grouping
      - Risk assessment (HIGH/MEDIUM/LOW)
    usage: "node permission-set-discovery.js --org myOrg --output discovery.json"
    added: v3.33.0

  analyzer:
    path: permission-set-analyzer.js
    purpose: Analyze overlap and consolidation opportunities
    capabilities:
      - Pairwise overlap calculation
      - Redundant permission detection
      - Consolidation recommendations with confidence levels
      - Risk scoring and effort estimation
    usage: "node permission-set-analyzer.js --org myOrg --initiative CPQ --output analysis.json"
    added: v3.33.0

  migration_planner:
    path: permission-set-migration-planner.js
    purpose: Generate executable migration plans
    capabilities:
      - 7-step migration plans with dependencies
      - Rollback procedures (5 steps, 15-20 min)
      - Validation checkpoints (5 automated checks)
      - Risk assessment with mitigations
    usage: "node permission-set-migration-planner.js --org myOrg --initiative CPQ --output plan.json"
    added: v3.33.0

  report_generator:
    path: permission-set-report-generator.js
    purpose: Generate human-readable markdown reports
    capabilities:
      - Discovery reports (org-wide inventory)
      - Analysis reports (overlap analysis)
      - Migration plan reports (step-by-step guides)
      - Batch report generation
    usage: "node permission-set-report-generator.js all discovery.json analysis.json plan.json ./reports/"
    added: v3.34.0

