name: Main Push Release Notes

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  send-release-notes:
    name: Send Main Push Release Notes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build main push summary
        id: summary
        run: |
          set -euo pipefail

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          COMPARE_URL="${{ github.event.compare }}"

          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            RANGE="$BEFORE_SHA..$AFTER_SHA"
          else
            RANGE="$AFTER_SHA"
          fi

          COMMIT_LINES="$(git log --format='- %h %s' "$RANGE" | sed -n '1,15p')"
          if [ -z "$COMMIT_LINES" ]; then
            COMMIT_LINES='- No commit summary available'
          fi

          {
            echo "message<<EOF"
            echo "${{ github.repository }} main updated"
            echo "Ref: ${{ github.ref_name }}"
            echo "Compare: $COMPARE_URL"
            echo ""
            printf '%s\n' "$COMMIT_LINES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish step summary
        run: |
          {
            echo "# Main Push Release Notes"
            echo ""
            printf '%s\n' "${{ steps.summary.outputs.message }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check for breaking changes
        id: check_breaking
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          HAS_BREAKING="false"
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            if git log --format='%s%n%b' "$BEFORE_SHA..$AFTER_SHA" | grep -qiE '^[a-z]+![:(]|BREAKING CHANGE|BREAKING:'; then
              HAS_BREAKING="true"
            fi
          fi
          echo "has_breaking=$HAS_BREAKING" >> "$GITHUB_OUTPUT"

      - name: Trigger release notes update
        env:
          GH_TOKEN: ${{ secrets.COMMERCIAL }}
        run: |
          gh workflow run weekly-release-notes.yml \
            --repo RevPalSFDC/opspal-plugin-internal-marketplace

      - name: Send release notes notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MESSAGE: ${{ steps.summary.outputs.message }}
        run: |
          set -euo pipefail
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; notification skipped."
            exit 0
          fi
          FULL_MESSAGE="${MESSAGE}"$'\n\n'"View release notes: https://opspal.gorevpal.com/release-notes.html"
          payload=$(jq -n --arg text "$FULL_MESSAGE" '{"text":$text}')
          curl -fsSL -X POST \
            -H "Content-type: application/json" \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
