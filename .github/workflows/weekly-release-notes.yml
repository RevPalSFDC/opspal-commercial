name: Daily Release Notes

on:
  schedule:
    - cron: '0 14 * * 1-5'   # Weekdays at 9am ET / 2pm UTC
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Start date (YYYY-MM-DD)'
        required: false
      to_date:
        description: 'End date (YYYY-MM-DD)'
        required: false

permissions:
  contents: write

jobs:
  generate-and-deploy:
    name: Generate and Deploy Release Notes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate release notes JSON
        env:
          INPUT_FROM: ${{ github.event.inputs.from_date }}
          INPUT_TO: ${{ github.event.inputs.to_date }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          node scripts/lib/generate-release-notes.js \
            ${INPUT_FROM:+--from "$INPUT_FROM"} \
            ${INPUT_TO:+--to "$INPUT_TO"} \
            --out-dir website/release-notes

      - name: Publish step summary
        run: |
          LATEST=$(ls -t website/release-notes/*.json 2>/dev/null | grep -v index | head -1)
          if [ -n "$LATEST" ]; then
            ENTRIES=$(node -e "const d=require('./$LATEST'); console.log(d.entries.length)")
            echo "## Release Notes Generated" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- File: \`$(basename "$LATEST")\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Customer-visible entries: $ENTRIES" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit release notes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/release-notes/
          git diff --cached --quiet || git commit -m "chore(release-notes): update release notes"
          git push

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy release notes to Firebase (incremental)
        run: |
          set -euo pipefail

          ACCESS_TOKEN=$(gcloud auth print-access-token)
          SITE="revpalportal"
          API="https://firebasehosting.googleapis.com/v1beta1"

          # Helper: parse JSON field from stdin
          parse() { node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);const v=$1;console.log(v??'')}catch(e){console.error('Parse error:',d.slice(0,200));process.exit(1)}})"; }

          # 1. Get current live version
          LIVE_VERSION=$(curl -sfS \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "$API/sites/$SITE/channels/live" \
            | parse "j.release?.version?.name")

          if [ -z "$LIVE_VERSION" ]; then
            echo "::error::Could not determine current live version"
            exit 1
          fi
          echo "Live version: $LIVE_VERSION"

          # 2. Get file listing from the live version
          LIVE_FILES=$(curl -sfS \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "$API/$LIVE_VERSION/files?pageSize=1000" \
            | parse "JSON.stringify((j.files||[]).reduce((m,f)=>{m[f.path]=f.hash;return m},{}))")
          echo "Live files: $(echo "$LIVE_FILES" | parse "Object.keys(j).length") files"

          # 3. Create a new empty version
          NEW_VERSION=$(curl -sfS -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$API/sites/$SITE/versions" \
            | parse "j.name")
          echo "New version: $NEW_VERSION"

          # 4. Build merged file map: all live files + updated release-notes
          MERGED_FILES=$(node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const zlib = require('zlib');

            // Start with all live files
            const files = $LIVE_FILES;

            // Add/replace release-notes JSON files
            const dir = 'website/release-notes';
            for (const name of fs.readdirSync(dir)) {
              if (!name.endsWith('.json')) continue;
              const content = fs.readFileSync(dir + '/' + name);
              const gzipped = zlib.gzipSync(content);
              const hash = crypto.createHash('sha256').update(gzipped).digest('hex');
              files['/release-notes/' + name] = hash;
            }

            console.log(JSON.stringify(files));
          ")
          echo "Merged files: $(echo "$MERGED_FILES" | parse "Object.keys(j).length") files"

          # 5. Populate the new version with the merged file map
          POPULATE_RESPONSE=$(curl -sfS -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"files\":$MERGED_FILES}" \
            "$API/$NEW_VERSION:populateFiles")

          UPLOAD_URL=$(echo "$POPULATE_RESPONSE" | parse "j.uploadUrl")
          UPLOAD_HASHES=$(echo "$POPULATE_RESPONSE" | parse "JSON.stringify(j.uploadRequiredHashes||[])")

          # 6. Upload any files Firebase doesn't already have (only release-notes change)
          if [ "$UPLOAD_HASHES" != "[]" ] && [ -n "$UPLOAD_URL" ]; then
            node -e "
              const fs = require('fs');
              const zlib = require('zlib');
              const crypto = require('crypto');
              const https = require('https');
              const url = require('url');

              const needed = new Set($UPLOAD_HASHES);
              const uploadUrl = '$UPLOAD_URL';
              const dir = 'website/release-notes';

              const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
              let uploaded = 0;

              function uploadFile(name) {
                return new Promise((resolve, reject) => {
                  const content = fs.readFileSync(dir + '/' + name);
                  const gzipped = zlib.gzipSync(content);
                  const hash = crypto.createHash('sha256').update(gzipped).digest('hex');

                  if (!needed.has(hash)) { resolve(); return; }

                  const parsed = new URL(uploadUrl + '/' + hash);
                  const req = https.request({
                    hostname: parsed.hostname,
                    path: parsed.pathname + parsed.search,
                    method: 'POST',
                    headers: {
                      'Authorization': 'Bearer $ACCESS_TOKEN',
                      'Content-Type': 'application/octet-stream',
                      'Content-Length': gzipped.length
                    }
                  }, (res) => {
                    let body = '';
                    res.on('data', c => body += c);
                    res.on('end', () => {
                      if (res.statusCode >= 200 && res.statusCode < 300) {
                        console.log('Uploaded: ' + name);
                        uploaded++;
                        resolve();
                      } else {
                        reject(new Error('Upload failed for ' + name + ': ' + res.statusCode + ' ' + body.slice(0,200)));
                      }
                    });
                  });
                  req.on('error', reject);
                  req.end(gzipped);
                });
              }

              Promise.all(files.map(uploadFile))
                .then(() => console.log('Uploaded ' + uploaded + ' file(s)'))
                .catch(e => { console.error(e.message); process.exit(1); });
            "
          else
            echo "All files already cached — no uploads needed."
          fi

          # 7. Finalize the version
          curl -sfS -X PATCH \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"FINALIZED"}' \
            "$API/$NEW_VERSION?updateMask=status" > /dev/null

          # 8. Release to live channel
          curl -sfS -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"Release notes update $(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            "$API/sites/$SITE/channels/live/releases?versionName=$NEW_VERSION" > /dev/null

          echo "Deployed release notes to https://opspal.gorevpal.com/release-notes.html"
