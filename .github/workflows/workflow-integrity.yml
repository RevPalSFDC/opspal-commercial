name: Workflow Integrity

on:
  push:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-workflows:
    name: Lint Workflow Definitions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          filter_mode: nofilter
          fail_on_error: true
          actionlint_flags: "-shellcheck="

      - name: Block deprecated or legacy action versions
        run: |
          set -euo pipefail

          violations=0

          check_pattern() {
            local pattern="$1"
            local message="$2"
            local matches

            matches=$(grep -RInE -- "$pattern" .github/workflows || true)

            if [ -n "$matches" ]; then
              echo "::error::${message}"
              echo "$matches"
              violations=$((violations + 1))
            fi
          }

          check_pattern 'uses:\s*actions/upload-artifact@v(1|2|3)\b' 'Deprecated upload-artifact version detected. Use actions/upload-artifact@v4.'
          check_pattern 'uses:\s*actions/download-artifact@v(1|2|3)\b' 'Deprecated download-artifact version detected. Use actions/download-artifact@v4.'
          check_pattern 'uses:\s*actions/checkout@v(1|2|3)\b' 'Legacy checkout version detected. Use actions/checkout@v4.'
          check_pattern 'uses:\s*actions/setup-node@v(1|2|3)\b' 'Legacy setup-node version detected. Use actions/setup-node@v4.'
          check_pattern 'uses:\s*actions/github-script@v([1-6])\b' 'Legacy github-script version detected. Use actions/github-script@v7.'
          check_pattern 'uses:\s*[^[:space:]]+@(main|master)\b' 'Action references pinned to a branch are not allowed. Pin to a release tag or full SHA.'

          if [ "$violations" -gt 0 ]; then
            echo "::error::Workflow integrity check failed with ${violations} violation(s)."
            exit 1
          fi

          echo "Workflow integrity checks passed."
