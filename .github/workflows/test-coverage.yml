name: Test Coverage

on:
  push:
    branches: [main, develop]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'plugins/**/hooks/**'
      - 'plugins/**/agents/**'
      - 'plugins/**/scripts/**/*.js'
      - 'plugins/**/.claude-plugin/hooks.json'
      - 'plugins/**/.claude-plugin/plugin.json'
      - 'plugins/**/package.json'
      - 'plugins/**/jest.config.js'
      - 'plugins/**/test/**'
      - 'plugins/**/tests/**'
      - 'scripts/**'
      - '.github/workflows/test-coverage.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'plugins/**/hooks/**'
      - 'plugins/**/agents/**'
      - 'plugins/**/scripts/**/*.js'
      - 'plugins/**/.claude-plugin/hooks.json'
      - 'plugins/**/.claude-plugin/plugin.json'
      - 'plugins/**/package.json'
      - 'plugins/**/jest.config.js'
      - 'plugins/**/test/**'
      - 'plugins/**/tests/**'
      - 'scripts/**'
      - '.github/workflows/test-coverage.yml'
  workflow_dispatch:

jobs:
  test-coverage:
    name: Test Coverage - ${{ matrix.plugin }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        plugin:
          - opspal-ai-consult
          - opspal-core
          - opspal-data-hygiene
          - opspal-gtm-planning
          - opspal-hubspot
          - opspal-marketo
          - opspal-monday
          - opspal-salesforce

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            plugins/${{ matrix.plugin }}/package-lock.json

      - name: Check test prerequisites
        id: preflight
        run: |
          PLUGIN_DIR="plugins/${{ matrix.plugin }}"

          if [ ! -d "$PLUGIN_DIR" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "has_package_json=false" >> $GITHUB_OUTPUT
            echo "has_tests=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "exists=true" >> $GITHUB_OUTPUT

          if [ -f "$PLUGIN_DIR/package.json" ]; then
            echo "has_package_json=true" >> $GITHUB_OUTPUT
          else
            echo "has_package_json=false" >> $GITHUB_OUTPUT
          fi

          if [ -d "$PLUGIN_DIR/scripts/__tests__" ] || \
             [ -d "$PLUGIN_DIR/scripts/lib/__tests__" ] || \
             [ -d "$PLUGIN_DIR/test" ] || \
             [ -d "$PLUGIN_DIR/tests" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.preflight.outputs.has_package_json == 'true'
        working-directory: plugins/${{ matrix.plugin }}
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Run tests with coverage
        if: steps.preflight.outputs.has_package_json == 'true' && steps.preflight.outputs.has_tests == 'true'
        working-directory: plugins/${{ matrix.plugin }}
        run: |
          if npm run test:coverage --if-present; then
            echo "Coverage command completed via test:coverage"
          elif npm test -- --coverage --passWithNoTests; then
            echo "Coverage command completed via npm test"
          else
            echo "::warning file=${{ matrix.plugin }}::Coverage execution failed; skipping hard enforcement for this plugin"
            exit 0
          fi

      - name: Check coverage threshold
        if: steps.preflight.outputs.has_package_json == 'true' && steps.preflight.outputs.has_tests == 'true'
        working-directory: plugins/${{ matrix.plugin }}
        run: |
          if [ ! -f "coverage/coverage-summary.json" ]; then
            echo "⚠️ No coverage summary generated for ${{ matrix.plugin }}"
            exit 0
          fi

          COVERAGE=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
          if [ -z "$COVERAGE" ] || [ "$COVERAGE" = "null" ]; then
            echo "⚠️ Coverage summary missing line percentage for ${{ matrix.plugin }}"
            exit 0
          fi
          echo "📊 Coverage: ${COVERAGE}%"

          if awk "BEGIN { exit !($COVERAGE < 60) }"; then
            echo "::error file=${{ matrix.plugin }}::Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi

      - name: Upload coverage artifact
        if: always() && steps.preflight.outputs.has_package_json == 'true' && steps.preflight.outputs.has_tests == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.plugin }}
          path: plugins/${{ matrix.plugin }}/coverage/
          if-no-files-found: ignore
          retention-days: 30

  dependency-check:
    name: Check Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Generate dependency report
        run: |
          npm outdated --json > /tmp/dependency-report.json || true
          test -f /tmp/dependency-report.json || echo '{}' > /tmp/dependency-report.json

      - name: Upload dependency report
        uses: actions/upload-artifact@v7
        with:
          name: dependency-report
          path: /tmp/dependency-report.json
          retention-days: 30

  summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [test-coverage, dependency-check]
    if: always()

    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: coverage-*
          path: coverage-reports

      - name: Generate summary
        run: |
          echo "# Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Plugin | Lines | Branches | Functions |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|----------|-----------|" >> $GITHUB_STEP_SUMMARY

          if [ ! -d coverage-reports ]; then
            echo "| _none_ | n/a | n/a | n/a |" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          found=0
          while IFS= read -r -d '' summary_file; do
            found=1
            plugin=$(basename "$(dirname "$summary_file")" | sed 's/^coverage-//')
            lines=$(jq -r '.total.lines.pct // "n/a"' "$summary_file")
            branches=$(jq -r '.total.branches.pct // "n/a"' "$summary_file")
            functions=$(jq -r '.total.functions.pct // "n/a"' "$summary_file")

            echo "| ${plugin} | ${lines}% | ${branches}% | ${functions}% |" >> $GITHUB_STEP_SUMMARY
          done < <(find coverage-reports -type f -name 'coverage-summary.json' -print0)

          if [ "$found" -eq 0 ]; then
            echo "| _none_ | n/a | n/a | n/a |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target**: 60% line coverage" >> $GITHUB_STEP_SUMMARY
