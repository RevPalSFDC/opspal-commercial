name: Plugin Release

on:
  push:
    tags:
      - 'opspal-*-v*'
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin name (e.g., opspal-salesforce)'
        required: true
        type: string
      version:
        description: 'Version tag (e.g., v3.5.0)'
        required: true
        type: string
      skip_tests:
        description: 'Skip pre-release tests'
        required: false
        type: boolean
        default: false

jobs:
  release:
    name: Release Plugin
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            plugins/**/package-lock.json

      - name: Extract plugin and version
        id: extract
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PLUGIN="${{ github.event.inputs.plugin }}"
            VERSION="${{ github.event.inputs.version }}"
            SKIP_TESTS="${{ github.event.inputs.skip_tests }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            if [[ ! "$TAG_NAME" =~ ^(opspal-[a-z0-9-]+)-(v[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?)$ ]]; then
              echo "::error::Tag does not match required format 'opspal-<plugin>-v<version>': ${TAG_NAME}"
              exit 1
            fi
            PLUGIN="${BASH_REMATCH[1]}"
            VERSION="${BASH_REMATCH[2]}"
            SKIP_TESTS="false"
          fi

          if [[ "$VERSION" != v* ]]; then
            VERSION="v${VERSION}"
          fi

          echo "plugin=$PLUGIN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip_tests=$SKIP_TESTS" >> "$GITHUB_OUTPUT"
          echo "tag_name=$PLUGIN-$VERSION" >> "$GITHUB_OUTPUT"

          {
            echo "### Release Details"
            echo "- **Plugin**: $PLUGIN"
            echo "- **Version**: $VERSION"
            echo "- **Tag**: $PLUGIN-$VERSION"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate plugin and manifest version
        run: |
          set -euo pipefail

          PLUGIN_DIR="plugins/${{ steps.extract.outputs.plugin }}"
          MANIFEST="$PLUGIN_DIR/.claude-plugin/plugin.json"
          EXPECTED_VERSION="${{ steps.extract.outputs.version }}"
          EXPECTED_VERSION="${EXPECTED_VERSION#v}"

          if [ ! -d "$PLUGIN_DIR" ]; then
            echo "::error::Plugin directory not found: $PLUGIN_DIR"
            exit 1
          fi

          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Plugin manifest not found: $MANIFEST"
            exit 1
          fi

          MANIFEST_VERSION="$(jq -r '.version // empty' "$MANIFEST")"
          if [ "$MANIFEST_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error file=$MANIFEST::Manifest version ($MANIFEST_VERSION) does not match release version ($EXPECTED_VERSION)"
            exit 1
          fi

          echo "✓ Plugin found: $PLUGIN_DIR"
          echo "✓ Manifest version matches release tag"

      - name: Install root dependencies
        run: npm ci

      - name: Install plugin dependencies
        run: |
          set -euo pipefail

          PLUGIN_DIR="plugins/${{ steps.extract.outputs.plugin }}"
          if [ ! -f "$PLUGIN_DIR/package.json" ]; then
            echo "No plugin package.json found for $PLUGIN_DIR; skipping plugin dependency install"
            exit 0
          fi

          if [ -f "$PLUGIN_DIR/package-lock.json" ]; then
            (cd "$PLUGIN_DIR" && npm ci)
          else
            (cd "$PLUGIN_DIR" && npm install)
          fi

      - name: Run pre-release validation
        if: steps.extract.outputs.skip_tests == 'false'
        run: |
          set -euo pipefail

          PLUGIN_DIR="plugins/${{ steps.extract.outputs.plugin }}"

          echo "Running repository validation gates..."
          npm run docs:ci
          node scripts/lib/verify-encrypted-assets.js

          if [ -f "$PLUGIN_DIR/package.json" ]; then
            echo "Running plugin tests for $PLUGIN_DIR..."
            (cd "$PLUGIN_DIR" && npm test --if-present)
          else
            echo "No plugin package.json found for $PLUGIN_DIR; skipping plugin test run"
          fi

          echo "✓ Pre-release validation passed"

      - name: Extract release notes
        run: |
          set -euo pipefail

          PLUGIN_DIR="plugins/${{ steps.extract.outputs.plugin }}"
          CHANGELOG_FILE="$PLUGIN_DIR/CHANGELOG.md"
          VERSION="${{ steps.extract.outputs.version }}"

          if [ -f "$CHANGELOG_FILE" ]; then
            NOTES=$(awk "/## \[$VERSION\]|## \[${VERSION#v}\]/,/## \[/{
              if (/## \[/ && !/## \[$VERSION\]|## \[${VERSION#v}\]/) exit;
              if (!/## \[$VERSION\]|## \[${VERSION#v}\]/) print
            }" "$CHANGELOG_FILE" | sed '/^$/d' || echo "")

            if [ -z "$NOTES" ]; then
              NOTES="Release $VERSION for ${{ steps.extract.outputs.plugin }}\n\nSee $PLUGIN_DIR/CHANGELOG.md for details."
            fi
          else
            NOTES="Release $VERSION for ${{ steps.extract.outputs.plugin }}"
          fi

          printf '%b\n' "$NOTES" > release-notes.md
          echo "Release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.extract.outputs.tag_name }}"
          PLUGIN="${{ steps.extract.outputs.plugin }}"
          VERSION="${{ steps.extract.outputs.version }}"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "::warning::GitHub release $TAG_NAME already exists"
          else
            gh release create "$TAG_NAME" \
              --title "$PLUGIN $VERSION" \
              --notes-file release-notes.md \
              --target main

            echo "✓ GitHub release created: $TAG_NAME"
          fi

          {
            echo "### Release Published"
            echo ""
            echo "🎉 [View Release](https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify catalog artifacts stay current
        run: |
          set -euo pipefail
          npm run docs:ci
          echo "✓ Generated marketplace catalog is current"

      - name: Send Slack notification
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; notification skipped."
            exit 0
          fi

          TAG_NAME="${{ steps.extract.outputs.tag_name }}"
          payload=$(jq -n \
            --arg plugin "${{ steps.extract.outputs.plugin }}" \
            --arg version "${{ steps.extract.outputs.version }}" \
            --arg url "https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME" \
            '{text: ("Plugin release published: " + $plugin + " " + $version + "\n" + $url)}')
          curl -fsSL -X POST \
            -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ steps.extract.outputs.plugin }}-${{ steps.extract.outputs.version }}
          path: |
            plugins/${{ steps.extract.outputs.plugin }}/.claude-plugin/plugin.json
            release-notes.md
            .claude-plugin/marketplace.json
            docs/PLUGIN_SUITE_CATALOG.json
            docs/PLUGIN_SUITE_CATALOG.md
          if-no-files-found: error
          retention-days: 90
