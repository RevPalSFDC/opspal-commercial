# Flow Validator Configuration
# Copy this file to your project root as .flow-validator.yml
# Customize rules and exceptions for org-specific requirements

# ============================================================================
# Rule Configuration
# ============================================================================
# Configure severity and enable/disable rules
# Severity levels: error, warning, note
# enabled: true/false

rules:
  # ──────────────────────────────────────────────────────────────────────────
  # CRITICAL RULES (deployment blockers)
  # ──────────────────────────────────────────────────────────────────────────

  mutual-exclusion-check:
    severity: error
    enabled: true
    description: "Ensure sObjectInputReference and inputAssignments are not used together"

  collection-before-count:
    severity: error
    enabled: true
    description: "Ensure collections exist before counting operations"

  dangling-references:
    severity: error
    enabled: true
    description: "Verify all element references resolve correctly"

  variable-declarations:
    severity: error
    enabled: true
    description: "Ensure all referenced variables are declared"

  required-elements:
    severity: error
    enabled: true
    description: "Check for required flow elements"

  # ──────────────────────────────────────────────────────────────────────────
  # BEST PRACTICE RULES
  # ──────────────────────────────────────────────────────────────────────────

  naming-conventions:
    severity: warning
    enabled: true
    description: "Check flow and variable naming conventions"

  flow-consolidation:
    severity: warning
    enabled: true
    description: "Check for flow consolidation opportunities"

  complexity-score:
    severity: warning
    enabled: true
    description: "Calculate complexity and recommend Apex if needed"
    # Threshold for complexity warning (default: 7)
    threshold: 7

  error-handling:
    severity: warning
    enabled: true
    description: "Ensure proper error handling exists"

  # ──────────────────────────────────────────────────────────────────────────
  # PERFORMANCE RULES
  # ──────────────────────────────────────────────────────────────────────────

  bulk-operations:
    severity: warning
    enabled: true
    description: "Check for bulk-safe operations"

  query-optimization:
    severity: warning
    enabled: true
    description: "Check for optimized queries"

  loop-efficiency:
    severity: warning
    enabled: true
    description: "Check for efficient loop usage"

  # ──────────────────────────────────────────────────────────────────────────
  # CUSTOM RULES (from Flow Scanner integration)
  # ──────────────────────────────────────────────────────────────────────────

  HardcodedId:
    severity: warning
    enabled: true
    description: "Detect hard-coded Salesforce IDs"
    expression: "[0-9]{15,18}"

  APIVersion:
    severity: error
    enabled: true
    description: "Ensure minimum API version"
    minVersion: 60

  DMLInLoop:
    severity: error
    enabled: true
    description: "Prevent DML operations inside loops"

  SOQLInLoop:
    severity: error
    enabled: true
    description: "Prevent SOQL queries inside loops"

# ============================================================================
# Exception Management
# ============================================================================
# Define violations to suppress at flow or global level

exceptions:
  # ──────────────────────────────────────────────────────────────────────────
  # FLOW-SPECIFIC EXCEPTIONS
  # ──────────────────────────────────────────────────────────────────────────
  # Suppress specific rules for individual flows
  # Use when a flow has documented reasons for violating a rule

  flows:
    # Example: Legacy flow with known hardcoded IDs (grandfathered)
    Legacy_Account_Update:
      - HardcodedId
      - MissingFaultPath
      # Reason: Pre-existing flow with business-critical hardcoded references
      # Documented in JIRA-1234, approved by architecture review board
      # Scheduled for refactoring in Q2 2025

    # Example: Migration flow that intentionally uses older API
    Data_Migration_Flow:
      - APIVersion
      # Reason: Must maintain compatibility with legacy external system
      # Documented in ADR-2023-05, approved by integration team

  # ──────────────────────────────────────────────────────────────────────────
  # GLOBAL EXCEPTIONS
  # ──────────────────────────────────────────────────────────────────────────
  # Suppress violations for specific elements across all flows
  # Use when an element pattern is org-wide acceptable

  global:
    DMLInLoop:
      # Example: Known safe usage in specific element
      - GetRecordsElement_1
      # Reason: Processes single record per iteration, max 10 iterations
      # Reviewed and approved as acceptable pattern

    HardcodedId:
      # Example: System administrator user ID
      - Admin_User_Assignment
      # Reason: References default admin user (005000000000000), system account
      # Acceptable use case per security guidelines

# ============================================================================
# Configuration Notes
# ============================================================================
# - Always document exceptions with reason, approver, and review date
# - Review exceptions quarterly to ensure they're still valid
# - Use flow-specific exceptions for individual cases
# - Use global exceptions for accepted org-wide patterns
# - Consider creating ADRs for architectural exceptions
# - Exceptions should be temporary when possible
#
# Best Practices:
# 1. Minimize exceptions - they reduce code quality visibility
# 2. Document thoroughly - future maintainers need context
# 3. Set expiration dates - force periodic review
# 4. Link to tickets/ADRs - provide audit trail
# 5. Get approval - exceptions should be conscious decisions
#
# Version: 1.0.0
# Last Updated: 2025-12-07
