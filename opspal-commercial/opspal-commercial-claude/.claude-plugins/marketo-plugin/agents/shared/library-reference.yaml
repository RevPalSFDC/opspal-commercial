# Marketo Plugin Library Reference
# Shared across all agents
# Version: 1.0.0

scripts:
  authentication:
    - name: marketo-auth-manager.js
      path: scripts/lib/marketo-auth-manager.js
      purpose: OAuth token management and API authentication
      commands:
        - test: Test authentication
        - token: Get current token info
        - refresh: Force token refresh
        - validate: Validate configuration

    - name: add-instance-config.js
      path: scripts/lib/add-instance-config.js
      purpose: Add new Marketo instance configuration
      modes:
        - interactive: CLI prompts for all values
        - cli: Pass values as arguments

  utilities:
    - name: marketo-api-client.js
      path: scripts/lib/marketo-api-client.js
      purpose: Centralized API client with error handling
      status: planned

    - name: instance-context-manager.js
      path: scripts/lib/instance-context-manager.js
      purpose: Persist and retrieve instance context
      status: planned

mcp_server:
  name: marketo-mcp-server
  path: mcp-server/
  entry: index.js
  tools:
    leads:
      - mcp__marketo__lead_query
      - mcp__marketo__lead_create
      - mcp__marketo__lead_update
      - mcp__marketo__lead_merge
      - mcp__marketo__lead_describe
      - mcp__marketo__lead_activities
      - mcp__marketo__lead_partitions
    campaigns:
      - mcp__marketo__campaign_list
      - mcp__marketo__campaign_get
      - mcp__marketo__campaign_activate
      - mcp__marketo__campaign_deactivate
      - mcp__marketo__campaign_schedule
      - mcp__marketo__campaign_request
      - mcp__marketo__campaign_types
    programs:
      - mcp__marketo__program_list
      - mcp__marketo__program_get
      - mcp__marketo__program_create
      - mcp__marketo__program_clone
      - mcp__marketo__program_members
      - mcp__marketo__program_channels
      - mcp__marketo__program_tags

configuration:
  files:
    - portals/config.json: Instance credentials (gitignored)
    - portals/.token-cache/: Token cache files
    - .env.example: Environment variable template

  environment_variables:
    required:
      - MARKETO_CLIENT_ID
      - MARKETO_CLIENT_SECRET
      - MARKETO_BASE_URL
    optional:
      - MARKETO_MUNCHKIN_ID
      - MARKETO_INSTANCE_NAME
      - MARKETO_API_TIMEOUT
      - MARKETO_RATE_LIMIT

instance_context:
  location: portals/{instance}/
  files:
    - INSTANCE_CONTEXT.json: Assessment history and metadata
    - INSTANCE_QUIRKS.json: Auto-detected customizations
    - QUICK_REFERENCE.md: Human-readable summary

api_limits:
  rate_limit: 100 calls per 20 seconds
  bulk_limit: 300 records per operation
  merge_limit: 3 loser leads per merge
  token_expiry: 3600 seconds (1 hour)

error_codes:
  authentication:
    601: Access token invalid
    602: Access token expired
  leads:
    1004: Lead not found
    1006: Field not found
    1007: Multiple leads match
  general:
    606: Max rate limit exceeded
    607: Daily quota exceeded
