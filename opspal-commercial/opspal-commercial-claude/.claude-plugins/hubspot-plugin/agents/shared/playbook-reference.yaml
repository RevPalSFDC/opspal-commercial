---
# HubSpot Core Plugin - Shared Playbook Reference
# Version: 1.0.0
# Last Updated: 2025-01-06
#
# This file documents operational playbooks available to HubSpot agents.
# Import this file to access comprehensive guides for complex operations.

playbooks:
  bulk_operations:
    path: ../../docs/BULK_OPERATIONS_PLAYBOOK.md
    purpose: |
      **Bulk Operations Standards for HubSpot API**
      Complete guide to batch processing, rate limiting, error handling, and performance optimization for HubSpot operations.
    use_cases:
      - Bulk contact imports (100+ records)
      - Mass property updates across objects
      - Batch association creation
      - Large-scale data migrations
      - Parallel API operations
      - High-volume workflow operations
    key_features:
      - "Batch size optimization (100 records/batch)"
      - "Rate limit management (100 req/10 sec)"
      - "Parallel processing patterns"
      - "Error aggregation and retry logic"
      - "Progress tracking and reporting"
      - "Association management at scale"
    mandatory_for:
      - All data operation agents
      - All API interaction agents
      - Orchestration agents
      - Contact/deal/company managers
      - Workflow builders
      - Property managers
    tools_referenced:
      - HubSpot Batch API
      - Association API
      - Rate limiter patterns
    roi_metrics:
      prevents: "Rate limit errors, incomplete migrations, data quality issues"
      time_saved: "40-80 hours/year in bulk operation troubleshooting"
      annual_value: "$6-12K"
    added: v1.2.0 (Playbook wiring)

  seo_content_optimization:
    path: ../../docs/SEO_CONTENT_OPTIMIZATION_PLAYBOOK.md
    purpose: |
      **SEO Content Optimization for HubSpot CMS**
      Strategies for optimizing content, keywords, metadata, and performance in HubSpot CMS.
      Covers on-page SEO, technical SEO, and content strategy.
    use_cases:
      - Blog post optimization
      - Landing page SEO
      - Content strategy and planning
      - Keyword research and mapping
      - Meta tag optimization
      - Internal linking strategies
    key_features:
      - "Keyword research methodologies"
      - "On-page optimization checklist"
      - "Technical SEO requirements"
      - "Content performance tracking"
      - "Schema markup patterns"
      - "Mobile optimization"
    mandatory_for:
      - SEO optimizer agents
      - Content management agents
      - CMS operations agents
    tools_referenced:
      - HubSpot SEO tools
      - Content optimization API
      - Analytics integration
    roi_metrics:
      prevents: "Poor search rankings, missed optimization opportunities"
      time_saved: "20-40 hours/year in SEO troubleshooting"
      annual_value: "$3-6K"
    added: v1.2.0 (Playbook wiring)

agent_categories:
  bulk_operations:
    agents:
      - hubspot-admin-specialist
      - hubspot-api
      - hubspot-autonomous-operations
      - hubspot-contact-manager
      - hubspot-data
      - hubspot-data-operations-manager
      - hubspot-integration-specialist
      - hubspot-orchestrator
      - hubspot-pipeline-manager
      - hubspot-property-manager
      - hubspot-workflow-auditor
      - hubspot-workflow-builder
    required_playbooks:
      - bulk_operations

  seo_operations:
    agents:
      - hubspot-seo-optimizer
    required_playbooks:
      - seo_content_optimization
      - bulk_operations

quick_reference:
  when_to_use:
    bulk_operations: "ANY HubSpot API operation with 10+ records (automatic, always reference)"
    seo_content_optimization: "SEO tasks, content optimization, keyword research, CMS operations"

  roi_summary:
    bulk_operations: "$6-12K/year (prevents rate limit issues, incomplete operations)"
    seo_content_optimization: "$3-6K/year (improves search rankings, content performance)"

usage_pattern: |
  ## How to Use Playbooks

  ### In Agent Instructions
  Reference specific playbooks when relevant to task:

  ```markdown
  When performing bulk operations:
  1. Review complete workflow in @import playbook-reference.yaml (bulk_operations)
  2. Follow batch size and rate limit guidelines
  3. Implement error handling patterns from playbook
  ```

  ### For All HubSpot Operations
  The bulk_operations playbook is automatically referenced by all data agents:

  ```markdown
  ## Automatic Bulk Operations Standards
  Your HubSpot API operations automatically follow bulk_operations playbook:
  - Batch processing (100 records/batch)
  - Rate limiting (100 req/10 sec)
  - Error aggregation
  See @import playbook-reference.yaml for complete details
  ```
