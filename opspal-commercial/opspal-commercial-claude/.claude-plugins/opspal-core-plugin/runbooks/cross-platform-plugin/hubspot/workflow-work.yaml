# HubSpot Workflow Work Playbook
# Standard decomposition pattern for HubSpot workflow automation
#
# Triggers: workflow, automation, enrollment, trigger, action
# Complexity: Medium (base 0.3, escalates with complex branching)

name: hubspot-workflow-work
version: "1.0.0"
description: Standard decomposition for HubSpot workflow automation
domain: hubspot-workflow
base_complexity: 0.3

# When to use this playbook
triggers:
  keywords:
    - workflow
    - automation
    - enrollment
    - trigger
    - action
    - branch
    - delay
    - hubspot flow
    - marketing automation
  patterns:
    - "create.*workflow"
    - "update.*automation"
    - "add.*enrollment"
    - "modify.*trigger"
    - "hubspot.*automation"

# Default task graph for workflow work
default_dag:
  - id: T-01
    title: Workflow Discovery
    domain: hubspot-workflow
    goal: Analyze existing workflows and automation landscape
    inputs:
      - portal_id
      - workflow_names_or_patterns
    outputs:
      - workflow_inventory.json
      - enrollment_criteria_map.json
      - action_catalog.json
    acceptance_criteria:
      - All existing workflows identified
      - Enrollment criteria documented
      - Current workflow performance data captured
      - Dependencies on lists/properties mapped
    dependencies: []
    can_run_in_parallel_with:
      - T-02
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: hubspot-workflow-analyzer
    estimated_complexity: 0.2
    estimated_duration_minutes: 15

  - id: T-02
    title: Requirements Analysis
    domain: hubspot-workflow
    goal: Define workflow requirements and acceptance criteria
    inputs:
      - requirements_doc
      - workflow_inventory.json
    outputs:
      - workflow_spec.md
      - enrollment_rules.json
      - action_sequence.json
    acceptance_criteria:
      - All enrollment criteria defined
      - Action sequence documented
      - Branch logic specified
      - Goal completion criteria defined
    dependencies: []
    can_run_in_parallel_with:
      - T-01
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: hubspot-planner
    estimated_complexity: 0.3
    estimated_duration_minutes: 20

  - id: T-03
    title: Property & List Validation
    domain: hubspot-data
    goal: Ensure required properties and lists exist
    inputs:
      - enrollment_rules.json
      - action_sequence.json
      - portal_id
    outputs:
      - property_status.json
      - list_status.json
      - missing_dependencies.md
    acceptance_criteria:
      - All required properties exist
      - All required lists exist
      - Property types appropriate for use
      - No missing dependencies
    dependencies:
      - T-01
      - T-02
    concurrency_group: hubspot-data
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: hubspot-data-validator
    estimated_complexity: 0.2
    estimated_duration_minutes: 15

  - id: T-04
    title: Workflow Implementation
    domain: hubspot-workflow
    goal: Create or update workflow with specified configuration
    inputs:
      - workflow_spec.md
      - enrollment_rules.json
      - action_sequence.json
      - property_status.json
    outputs:
      - workflow_config.json
      - workflow_id.txt
      - implementation_notes.md
    acceptance_criteria:
      - Workflow created/updated successfully
      - All enrollment criteria configured
      - All actions configured
      - Branch logic correct
      - Goal tracking configured
    dependencies:
      - T-03
    concurrency_group: hubspot-workflow
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed_with_approval
      destructive_ops: forbidden
    stop_points:
      - Before creating new workflow
      - Before modifying existing workflow
    assigned_agent: hubspot-workflow-builder
    estimated_complexity: 0.5
    estimated_duration_minutes: 35

  - id: T-05
    title: Workflow Testing
    domain: hubspot-workflow
    goal: Test workflow with sample records
    inputs:
      - workflow_id.txt
      - portal_id
    outputs:
      - test_results.json
      - enrollment_test_log.txt
      - action_execution_log.txt
    acceptance_criteria:
      - Test enrollment succeeds
      - All actions execute correctly
      - Branch logic verified
      - No errors in execution
      - Timing/delays function correctly
    dependencies:
      - T-04
    concurrency_group: hubspot-workflow
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    verification_commands:
      - "node scripts/lib/hubspot-workflow-tester.js --workflow {workflowId} --mode test"
    assigned_agent: hubspot-workflow-tester
    estimated_complexity: 0.4
    estimated_duration_minutes: 25

  - id: T-06
    title: Workflow Activation
    domain: hubspot-workflow
    goal: Activate workflow and monitor initial execution
    inputs:
      - workflow_id.txt
      - test_results.json
    outputs:
      - activation_status.json
      - initial_metrics.json
      - monitoring_setup.json
    acceptance_criteria:
      - Workflow activated successfully
      - Initial enrollments processing
      - No immediate errors
      - Monitoring alerts configured
    dependencies:
      - T-05
    concurrency_group: hubspot-workflow
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    stop_points:
      - Before activation (final review)
    assigned_agent: hubspot-workflow-builder
    estimated_complexity: 0.2
    estimated_duration_minutes: 15

# Rules for parallelization
parallelization_rules:
  - description: "Discovery and requirements can run in parallel"
    tasks: [T-01, T-02]
    reason: "Independent analysis activities"

  - description: "Validation needs both discovery outputs"
    tasks: [T-03]
    requires: [T-01, T-02]
    reason: "Need full picture before validating dependencies"

  - description: "Implementation through activation is sequential"
    tasks: [T-04, T-05, T-06]
    constraint: "strict_sequential"
    reason: "Each step depends on previous completion"

# Rules for sequential execution
sequential_rules:
  - "Never activate workflow without testing"
  - "Validate dependencies before implementation"
  - "Test with sample records before full activation"

# Verification gates
verification_gates:
  - name: property_validation
    type: custom
    checks:
      - all_properties_exist
      - property_types_match
      - no_deprecated_properties
    required: true

  - name: workflow_syntax
    type: custom
    checks:
      - valid_enrollment_criteria
      - valid_action_sequence
      - no_orphan_branches
    required: true

  - name: test_execution
    type: command
    command: "node scripts/lib/hubspot-workflow-tester.js --workflow {workflowId} --validate"
    success_criteria:
      status: passed
    required: true

# Escalation conditions
escalation_triggers:
  - condition: "complex branching (5+ branches)"
    add_tasks:
      - branch_logic_review
      - edge_case_testing
    escalate_complexity: 0.2
    reason: "Complex branching increases testing requirements"

  - condition: "high volume (1000+ enrollments/day)"
    add_tasks:
      - performance_analysis
      - rate_limit_verification
    escalate_complexity: 0.15
    reason: "High volume requires capacity planning"

  - condition: "revenue-impacting workflow"
    add_tasks:
      - business_approval
      - rollback_plan
    escalate_complexity: 0.2
    reason: "Revenue workflows require additional safeguards"

# Common variations
variations:
  nurture_workflow:
    description: "Multi-email nurture sequence"
    additional_considerations:
      - Email send frequency
      - Unsubscribe handling
      - Goal completion suppression
    add_acceptance_criteria:
      - "Send frequency compliant with policy"
      - "Unsubscribe honored at all stages"
      - "Goal triggers suppression"

  lead_routing:
    description: "Lead assignment workflow"
    additional_considerations:
      - Round-robin fairness
      - Capacity limits
      - SLA compliance
    add_acceptance_criteria:
      - "Fair distribution across owners"
      - "SLA tracking configured"
      - "Overflow handling defined"

  data_enrichment:
    description: "Property update workflow"
    additional_considerations:
      - Data validation before update
      - Audit trail requirements
      - Sync implications
    add_acceptance_criteria:
      - "Data validation rules enforced"
      - "Changes tracked for audit"
      - "Sync conflicts handled"
