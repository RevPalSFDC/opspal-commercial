name: Docs Gardening

on:
  schedule:
    - cron: '17 13 * * 1'
  workflow_dispatch:

jobs:
  docs-gardening:
    name: Weekly Docs Gardening
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate documentation artifacts
        run: npm run docs:generate

      - name: Detect generated docs drift
        id: drift
        run: |
          if git diff --quiet -- AGENTS.md README.md CLAUDE.md docs/PLUGIN_SUITE_CATALOG.md docs/PLUGIN_SUITE_CATALOG.json docs/PLUGIN_OWNERSHIP_AND_LIFECYCLE.md; then
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            echo "No docs drift detected."
          else
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
            echo "Generated docs drift detected:"
            git status --short -- AGENTS.md README.md CLAUDE.md docs/PLUGIN_SUITE_CATALOG.md docs/PLUGIN_SUITE_CATALOG.json docs/PLUGIN_OWNERSHIP_AND_LIFECYCLE.md
          fi

      - name: Run docs validation gates
        id: docs_ci
        continue-on-error: true
        run: npm run docs:ci

      - name: Open or update docs gardening issue
        if: steps.drift.outputs.has_drift == 'true' || steps.docs_ci.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          DOCS_DRIFT: ${{ steps.drift.outputs.has_drift }}
          DOCS_CI_OUTCOME: ${{ steps.docs_ci.outcome }}
        with:
          script: |
            const title = '[Docs Gardening] Drift or docs gate failure detected';
            const body = [
              'Automated docs gardening detected follow-up work.',
              '',
              `- Docs drift detected: ${process.env.DOCS_DRIFT}`,
              `- docs:ci outcome: ${process.env.DOCS_CI_OUTCOME}`,
              `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Suggested remediation:',
              '1. Run `npm run docs:generate`.',
              '2. Run `npm run docs:ci` and resolve failures.',
              '3. Commit regenerated docs and baseline updates (if intentional).'
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }

      - name: Fail job when drift or docs:ci failed
        if: steps.drift.outputs.has_drift == 'true' || steps.docs_ci.outcome == 'failure'
        run: |
          echo "::error::Docs gardening detected drift or docs:ci failure."
          exit 1
