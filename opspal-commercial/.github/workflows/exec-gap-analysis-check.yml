name: Exec Gap Analysis Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'docs/PLUGIN_SUITE_CATALOG.json'
      - 'docs/PLUGIN_OWNERSHIP_AND_LIFECYCLE.md'
      - 'README.md'
      - 'FEATURES.md'
      - 'plugins/**/.claude-plugin/plugin.json'
      - 'plugins/**/agents/**/*.md'
      - 'plugins/**/commands/**/*.md'
      - 'plugins/**/skills/**/*.md'
      - 'plugins/**/hooks/**/*.sh'
      - 'scripts/generate-exec-gap-analysis.js'
      - 'scripts/generate-next-best-actions.js'
      - 'scripts/validate-exec-gap-analysis.js'
      - 'docs/contracts/**'
      - 'reports/exec/**'
      - '.github/workflows/exec-gap-analysis-check.yml'
  push:
    branches: [main, develop]
    paths:
      - 'docs/PLUGIN_SUITE_CATALOG.json'
      - 'docs/PLUGIN_OWNERSHIP_AND_LIFECYCLE.md'
      - 'README.md'
      - 'FEATURES.md'
      - 'plugins/**/.claude-plugin/plugin.json'
      - 'plugins/**/agents/**/*.md'
      - 'plugins/**/commands/**/*.md'
      - 'plugins/**/skills/**/*.md'
      - 'plugins/**/hooks/**/*.sh'
      - 'scripts/generate-exec-gap-analysis.js'
      - 'scripts/generate-next-best-actions.js'
      - 'scripts/validate-exec-gap-analysis.js'
      - 'docs/contracts/**'
      - 'reports/exec/**'
      - '.github/workflows/exec-gap-analysis-check.yml'
  workflow_dispatch:

jobs:
  exec-gap-analysis:
    name: Validate Exec Gap Analysis Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate and validate executive artifacts
        run: npm run exec:ci

      - name: Enforce generated artifact consistency
        run: |
          git diff --exit-code -- reports/exec docs/contracts
