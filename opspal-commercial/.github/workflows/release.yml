name: Plugin Release

on:
  push:
    tags:
      - 'opspal-*-v*'
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin name (e.g., opspal-salesforce)'
        required: true
        type: string
      version:
        description: 'Version tag (e.g., v3.5.0)'
        required: true
        type: string
      skip_tests:
        description: 'Skip pre-release tests'
        required: false
        type: boolean
        default: false

jobs:
  release:
    name: Release Plugin
    runs-on: ubuntu-latest
    # Only run on tag pushes or manual workflow dispatch
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract plugin and version from tag
        id: extract
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PLUGIN="${{ github.event.inputs.plugin }}"
            VERSION="${{ github.event.inputs.version }}"
            SKIP_TESTS="${{ github.event.inputs.skip_tests }}"
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
            # Extract plugin-name and version from tag (format: plugin-name-vX.Y.Z)
            PLUGIN=$(echo "$TAG_NAME" | sed -E 's/(-v[0-9]+\.[0-9]+\.[0-9]+)$//')
            VERSION=$(echo "$TAG_NAME" | sed -E 's/.*-(v[0-9]+\.[0-9]+\.[0-9]+)$/\1/')
            SKIP_TESTS="false"
          fi

          echo "plugin=$PLUGIN" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "skip_tests=$SKIP_TESTS" >> $GITHUB_OUTPUT
          echo "tag_name=$PLUGIN-$VERSION" >> $GITHUB_OUTPUT

          echo "### Release Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Plugin**: $PLUGIN" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: $PLUGIN-$VERSION" >> $GITHUB_STEP_SUMMARY

      - name: Validate plugin exists
        run: |
          PLUGIN_DIR="plugins/${{ steps.extract.outputs.plugin }}"
          if [ ! -d "$PLUGIN_DIR" ]; then
            echo "::error::Plugin directory not found: $PLUGIN_DIR"
            exit 1
          fi
          echo "✓ Plugin found: $PLUGIN_DIR"

      - name: Install dependencies
        run: |
          cd dev-tools/developer-tools-plugin
          npm install --production

      - name: Run pre-release validation
        if: steps.extract.outputs.skip_tests == 'false'
        env:
          NODE_PATH: ${{ github.workspace }}/dev-tools/developer-tools-plugin/node_modules
        run: |
          PLUGIN_DIR="plugins/${{ steps.extract.outputs.plugin }}"

          echo "Running plugin validation..."
          node dev-tools/developer-tools-plugin/scripts/validate-plugin.js "$PLUGIN_DIR" --json > validation-result.json

          SCORE=$(jq -r '.qualityScore.score' validation-result.json)
          CRITICAL=$(jq -r '.summary.critical' validation-result.json)

          echo "Quality Score: $SCORE/100"
          echo "Critical Issues: $CRITICAL"

          if [ "$SCORE" -lt 80 ] || [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Plugin quality below threshold for release"
            jq '.issues' validation-result.json
            exit 1
          fi

          echo "✓ Plugin validation passed"

      - name: Run integration tests
        if: steps.extract.outputs.skip_tests == 'false'
        env:
          NODE_PATH: ${{ github.workspace }}/dev-tools/developer-tools-plugin/node_modules
        run: |
          echo "Running integration tests (Levels 1-3)..."
          node dev-tools/developer-tools-plugin/scripts/test-plugin-installation.js \
            --plugin "${{ steps.extract.outputs.plugin }}" \
            --level 1-3 || {
            echo "::error::Integration tests failed"
            exit 1
          }
          echo "✓ Integration tests passed"

      - name: Extract release notes
        id: release_notes
        run: |
          PLUGIN_DIR="plugins/${{ steps.extract.outputs.plugin }}"
          CHANGELOG_FILE="$PLUGIN_DIR/CHANGELOG.md"
          VERSION="${{ steps.extract.outputs.version }}"

          if [ -f "$CHANGELOG_FILE" ]; then
            # Extract section for this version
            NOTES=$(awk "/## \[$VERSION\]|## \[${VERSION#v}\]/,/## \[/{
              if (/## \[/ && !/## \[$VERSION\]|## \[${VERSION#v}\]/) exit;
              if (!/## \[$VERSION\]|## \[${VERSION#v}\]/) print
            }" "$CHANGELOG_FILE" | sed '/^$/d' || echo "")

            if [ -z "$NOTES" ]; then
              NOTES="Release $VERSION for ${{ steps.extract.outputs.plugin }}\n\nSee [CHANGELOG.md]($PLUGIN_DIR/CHANGELOG.md) for details."
            fi
          else
            NOTES="Release $VERSION for ${{ steps.extract.outputs.plugin }}"
          fi

          # Save to file for multiline support
          echo "$NOTES" > /tmp/release-notes.md

          echo "Release notes:"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.extract.outputs.tag_name }}"
          PLUGIN="${{ steps.extract.outputs.plugin }}"
          VERSION="${{ steps.extract.outputs.version }}"

          # Check if release already exists
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "::warning::GitHub release $TAG_NAME already exists"
          else
            gh release create "$TAG_NAME" \
              --title "$PLUGIN $VERSION" \
              --notes-file /tmp/release-notes.md \
              --target main

            echo "✓ GitHub release created: $TAG_NAME"
          fi

          # Add release URL to summary
          echo "### Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 [View Release](https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME)" >> $GITHUB_STEP_SUMMARY

      - name: Update marketplace catalog
        env:
          NODE_PATH: ${{ github.workspace }}/dev-tools/developer-tools-plugin/node_modules
        run: |
          echo "Regenerating marketplace catalog..."
          node dev-tools/developer-tools-plugin/scripts/build-marketplace-catalog.js --all --json > marketplace-catalog.json
          echo "✓ Marketplace catalog updated"

      - name: Commit catalog update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add marketplace-catalog.json

          if git diff --staged --quiet; then
            echo "No catalog changes to commit"
          else
            git commit -m "$(cat <<EOF
          chore: Update marketplace catalog for ${{ steps.extract.outputs.plugin }} ${{ steps.extract.outputs.version }}

          🤖 Automated update via GitHub Actions
          EOF
          )"
            git push origin main
            echo "✓ Catalog updated and pushed"
          fi

      - name: Send Slack notification
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not configured - skipping notification"
            exit 0
          fi

          # Use the notification script
          node dev-tools/developer-tools-plugin/scripts/send-plugin-release-notification.js \
            "${{ steps.extract.outputs.version }}" \
            "${{ steps.extract.outputs.plugin }}" || {
            echo "::warning::Failed to send Slack notification"
          }

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-${{ steps.extract.outputs.plugin }}-${{ steps.extract.outputs.version }}
          path: validation-result.json
          retention-days: 90
