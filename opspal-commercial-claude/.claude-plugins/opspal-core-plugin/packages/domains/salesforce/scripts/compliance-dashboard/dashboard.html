<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salesforce Standards Compliance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .score-display {
            font-size: 3em;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
        }
        
        .score-excellent { color: #00c851; }
        .score-good { color: #ffbb33; }
        .score-poor { color: #ff4444; }
        
        .trend {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .trend-improving {
            background: #d4edda;
            color: #155724;
        }
        
        .trend-declining {
            background: #f8d7da;
            color: #721c24;
        }
        
        .trend-stable {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .violation-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .violation-item {
            padding: 10px;
            margin: 5px 0;
            background: #f8f9fa;
            border-left: 4px solid #ff4444;
            border-radius: 4px;
        }
        
        .violation-category {
            font-weight: bold;
            color: #666;
            margin-bottom: 5px;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .metric-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .metric-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-success {
            background: #00c851;
            color: white;
        }
        
        .btn-success:hover {
            background: #00a041;
        }
        
        .timestamp {
            text-align: center;
            color: white;
            margin-top: 20px;
            opacity: 0.8;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.5em;
        }
        
        .error {
            background: #ff4444;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Salesforce Standards Compliance Dashboard</h1>
        
        <div id="loading" class="loading">Loading compliance data...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="dashboard" style="display: none;">
            <div class="dashboard-grid">
                <!-- Overall Score Card -->
                <div class="card">
                    <h2>Overall Compliance Score</h2>
                    <div id="overall-score" class="score-display">--%</div>
                    <div style="text-align: center;">
                        <span id="trend-badge" class="trend">-</span>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric-item">
                            <div class="metric-value" id="passed-count">0</div>
                            <div class="metric-label">Passed</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-value" id="failed-count">0</div>
                            <div class="metric-label">Failed</div>
                        </div>
                    </div>
                </div>
                
                <!-- Category Breakdown -->
                <div class="card">
                    <h2>Category Breakdown</h2>
                    <div class="chart-container">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
                
                <!-- Trend Chart -->
                <div class="card">
                    <h2>Compliance Trend (30 Days)</h2>
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
                
                <!-- Top Violations -->
                <div class="card">
                    <h2>Top Violations</h2>
                    <div id="violations-list" class="violation-list">
                        <!-- Violations will be populated here -->
                    </div>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="card">
                <h2>Quick Actions</h2>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="runCheck()">🔄 Run Check</button>
                    <button class="btn btn-success" onclick="fixAll()">🔧 Fix All Issues</button>
                    <button class="btn btn-primary" onclick="generateReport()">📄 Generate Report</button>
                    <button class="btn btn-primary" onclick="refreshData()">🔄 Refresh Dashboard</button>
                </div>
            </div>
        </div>
        
        <div class="timestamp" id="timestamp">Last updated: --</div>
    </div>
    
    <script>
        let categoryChart = null;
        let trendChart = null;
        
        async function loadComplianceData() {
            try {
                // In production, this would fetch from an API endpoint
                // For now, we'll load from a local JSON file
                const response = await fetch('/docs/compliance-metrics.json');
                if (!response.ok) {
                    throw new Error('Failed to load compliance data');
                }
                
                const data = await response.json();
                updateDashboard(data);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } catch (error) {
                showError('Failed to load compliance data. Using sample data.');
                useSampleData();
            }
        }
        
        function updateDashboard(data) {
            // Update overall score
            const score = data.currentScore || 0;
            const scoreElement = document.getElementById('overall-score');
            scoreElement.textContent = score + '%';
            
            // Set color based on score
            if (score >= 95) {
                scoreElement.className = 'score-display score-excellent';
            } else if (score >= 80) {
                scoreElement.className = 'score-display score-good';
            } else {
                scoreElement.className = 'score-display score-poor';
            }
            
            // Update trend
            const trendElement = document.getElementById('trend-badge');
            const trend = data.trend || 'stable';
            trendElement.textContent = trend.charAt(0).toUpperCase() + trend.slice(1);
            trendElement.className = 'trend trend-' + trend;
            
            // Update counts
            const lastEntry = data.history && data.history.length > 0 
                ? data.history[data.history.length - 1] 
                : { passed: 0, failed: 0 };
            
            document.getElementById('passed-count').textContent = lastEntry.passed || 0;
            document.getElementById('failed-count').textContent = lastEntry.failed || 0;
            
            // Update category chart
            updateCategoryChart(data.violations);
            
            // Update trend chart
            updateTrendChart(data.history || []);
            
            // Update violations list
            updateViolationsList(data.violations);
            
            // Update timestamp
            document.getElementById('timestamp').textContent = 
                'Last updated: ' + new Date(data.lastCheck || Date.now()).toLocaleString();
        }
        
        function updateCategoryChart(violations) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            
            const categories = Object.keys(violations || {});
            const counts = categories.map(cat => (violations[cat] || []).length);
            
            if (categoryChart) {
                categoryChart.destroy();
            }
            
            categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: categories.map(c => c.charAt(0).toUpperCase() + c.slice(1)),
                    datasets: [{
                        data: counts,
                        backgroundColor: [
                            '#FF6384',
                            '#36A2EB',
                            '#FFCE56',
                            '#4BC0C0'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    legend: {
                        position: 'bottom'
                    }
                }
            });
        }
        
        function updateTrendChart(history) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            // Prepare data for last 30 days
            const labels = history.slice(-30).map(h => 
                new Date(h.timestamp).toLocaleDateString()
            );
            const scores = history.slice(-30).map(h => h.score);
            
            if (trendChart) {
                trendChart.destroy();
            }
            
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Compliance Score',
                        data: scores,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100
                        }
                    }
                }
            });
        }
        
        function updateViolationsList(violations) {
            const container = document.getElementById('violations-list');
            container.innerHTML = '';
            
            let totalViolations = 0;
            
            Object.keys(violations || {}).forEach(category => {
                const categoryViolations = violations[category] || [];
                if (categoryViolations.length > 0) {
                    categoryViolations.slice(0, 3).forEach(violation => {
                        const item = document.createElement('div');
                        item.className = 'violation-item';
                        item.innerHTML = `
                            <div class="violation-category">${category}</div>
                            <div>${violation.issue || violation.check}</div>
                        `;
                        container.appendChild(item);
                        totalViolations++;
                    });
                }
            });
            
            if (totalViolations === 0) {
                container.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">No violations found! 🎉</div>';
            }
        }
        
        function useSampleData() {
            // Sample data for demonstration
            const sampleData = {
                currentScore: 85,
                trend: 'improving',
                lastCheck: new Date().toISOString(),
                history: Array.from({length: 30}, (_, i) => ({
                    timestamp: new Date(Date.now() - (29 - i) * 86400000).toISOString(),
                    score: 75 + Math.floor(Math.random() * 20),
                    passed: 15 + Math.floor(Math.random() * 10),
                    failed: Math.floor(Math.random() * 5)
                })),
                violations: {
                    documentation: [
                        { check: 'Documentation Location', issue: 'README.md in wrong folder' }
                    ],
                    reportTypes: [
                        { check: 'Report Type Coverage', issue: 'Missing report type for Contract__c' }
                    ],
                    lightningPages: [],
                    metadata: []
                }
            };
            
            updateDashboard(sampleData);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }
        
        function showError(message) {
            const errorElement = document.getElementById('error');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
            setTimeout(() => {
                errorElement.style.display = 'none';
            }, 5000);
        }
        
        async function runCheck() {
            showError('Running compliance check... (In production, this would trigger the check)');
            // In production, this would call an API endpoint
        }
        
        async function fixAll() {
            showError('Fixing all issues... (In production, this would trigger auto-fix)');
            // In production, this would call an API endpoint
        }
        
        async function generateReport() {
            showError('Generating report... (In production, this would generate a report)');
            // In production, this would call an API endpoint
        }
        
        function refreshData() {
            location.reload();
        }
        
        // Load data on page load
        window.addEventListener('DOMContentLoaded', loadComplianceData);
        
        // Auto-refresh every 5 minutes
        setInterval(loadComplianceData, 300000);
    </script>
</body>
</html>
