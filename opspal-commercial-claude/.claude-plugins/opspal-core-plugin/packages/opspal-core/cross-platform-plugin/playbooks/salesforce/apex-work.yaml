# Salesforce Apex Work Playbook
# Standard decomposition pattern for Apex development
#
# Triggers: apex, trigger, class, batch, test, controller
# Complexity: Medium (base 0.4, escalates with triggers or batch jobs)

name: salesforce-apex-work
version: "1.0.0"
description: Standard decomposition for Apex code development
domain: salesforce-apex
base_complexity: 0.4

# When to use this playbook
triggers:
  keywords:
    - apex
    - trigger
    - class
    - batch
    - queueable
    - schedulable
    - test class
    - controller
    - service
    - handler
  patterns:
    - "create.*apex"
    - "write.*trigger"
    - "add.*class"
    - "update.*code"
    - "fix.*apex"
    - "batch.*job"

# Default task graph for Apex work
default_dag:
  - id: T-01
    title: Codebase Discovery
    domain: salesforce-apex
    goal: Locate existing code patterns, related classes, and test coverage
    inputs:
      - org_alias
      - object_or_feature_name
    outputs:
      - code_inventory.json
      - existing_patterns.md
      - test_coverage_report.json
      - dependency_map.json
    acceptance_criteria:
      - All related Apex classes identified
      - Existing patterns documented (handler, service, selector)
      - Current test coverage baseline recorded
      - Dependencies mapped
    dependencies: []
    can_run_in_parallel_with:
      - T-02
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: forbidden
      destructive_ops: forbidden
    assigned_agent: salesforce-plugin:sfdc-apex-developer
    estimated_complexity: 0.2
    estimated_duration_minutes: 15

  - id: T-02
    title: Requirements Analysis
    domain: salesforce-apex
    goal: Define technical requirements and acceptance criteria
    inputs:
      - requirements_doc
      - code_inventory.json
    outputs:
      - technical_spec.md
      - interface_contracts.json
      - test_scenarios.md
    acceptance_criteria:
      - All functional requirements mapped to technical approach
      - Method signatures defined
      - Test scenarios documented
      - Edge cases identified
    dependencies: []
    can_run_in_parallel_with:
      - T-01
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: salesforce-plugin:sfdc-planner
    estimated_complexity: 0.3
    estimated_duration_minutes: 20

  - id: T-03
    title: Apex Implementation
    domain: salesforce-apex
    goal: Write Apex code following org patterns and best practices
    inputs:
      - technical_spec.md
      - existing_patterns.md
      - dependency_map.json
    outputs:
      - apex_classes/*.cls
      - implementation_notes.md
    acceptance_criteria:
      - Code follows existing org patterns
      - Bulkification implemented for all DML
      - SOQL queries follow best practices
      - Code compiles without errors
      - Comments and documentation included
    dependencies:
      - T-01
      - T-02
    concurrency_group: apex
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed_with_approval
      destructive_ops: forbidden
    stop_points:
      - Before creating new class files
    assigned_agent: salesforce-plugin:sfdc-apex-developer
    estimated_complexity: 0.6
    estimated_duration_minutes: 45

  - id: T-04
    title: Test Class Development
    domain: salesforce-apex
    goal: Write comprehensive test classes with 75%+ coverage
    inputs:
      - apex_classes/*.cls
      - test_scenarios.md
      - technical_spec.md
    outputs:
      - test_classes/*Test.cls
      - test_data_factory.cls
    acceptance_criteria:
      - Test coverage >= 75% for all new code
      - Positive and negative scenarios covered
      - Bulk testing with 200+ records
      - Assert statements verify behavior, not just coverage
    dependencies:
      - T-03
    can_run_in_parallel_with: []
    concurrency_group: apex
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed_with_approval
      destructive_ops: forbidden
    assigned_agent: salesforce-plugin:sfdc-apex-developer
    estimated_complexity: 0.5
    estimated_duration_minutes: 40

  - id: T-05
    title: Local Validation
    domain: salesforce-apex
    goal: Run tests and validate code locally/sandbox
    inputs:
      - apex_classes/*.cls
      - test_classes/*Test.cls
      - org_alias
    outputs:
      - test_results.json
      - coverage_report.json
      - validation_log.txt
    acceptance_criteria:
      - All tests pass
      - Coverage meets minimum threshold (75%)
      - No PMD/lint violations at error level
      - Code compiles in target org
    dependencies:
      - T-03
      - T-04
    concurrency_group: metadata
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    verification_commands:
      - "sf apex test run --code-coverage --result-format json"
      - "sf scanner run --target force-app --format json"
    assigned_agent: salesforce-plugin:sfdc-deployment-manager
    estimated_complexity: 0.3
    estimated_duration_minutes: 20

  - id: T-06
    title: Code Review
    domain: review
    goal: Independent review of Apex code for quality and security
    inputs:
      - apex_classes/*.cls
      - test_classes/*Test.cls
      - implementation_notes.md
    outputs:
      - review_notes.md
      - security_findings.json
      - improvement_suggestions.md
    acceptance_criteria:
      - Code reviewed for CRUD/FLS compliance
      - No SOQL/DML in loops
      - Proper error handling
      - Security review completed
      - Approval or rejection recorded
    dependencies:
      - T-05
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: feature-dev:code-reviewer
    estimated_complexity: 0.3
    estimated_duration_minutes: 20

# Parallelization rules
parallelization_rules:
  - description: "Discovery and Requirements can run in parallel"
    tasks: [T-01, T-02]
    reason: "Independent analysis activities"

  - description: "Implementation must wait for discovery"
    tasks: [T-03]
    requires: [T-01, T-02]
    reason: "Need patterns and requirements before coding"

  - description: "Test development follows implementation"
    tasks: [T-04]
    requires: [T-03]
    reason: "Tests are written against implemented code"

# Sequential rules
sequential_rules:
  - "Discovery → Design → Implementation → Testing → Validation → Review"
  - "Never commit code without passing tests"
  - "Review must complete before production deployment"

# Verification gates
verification_gates:
  - name: apex_compile
    type: command
    command: "sf project deploy validate --source-dir force-app --dry-run"
    success_criteria:
      exit_code: 0
    required: true

  - name: apex_tests
    type: command
    command: "sf apex test run --code-coverage --result-format json --wait 10"
    success_criteria:
      outcome: Passed
      coverage_threshold: 75
    required: true

  - name: security_scan
    type: command
    command: "sf scanner run --target force-app --format json"
    success_criteria:
      max_violations: 0
      severity_threshold: error
    required: true

  - name: pmd_check
    type: command
    command: "pmd check --dir force-app --rulesets apex-ruleset.xml --format json"
    success_criteria:
      violations: 0
    required: false

# Escalation conditions
escalation_triggers:
  - condition: "trigger development"
    add_tasks:
      - trigger_handler_pattern_check
      - recursion_prevention_validation
    escalate_complexity: 0.1
    reason: "Triggers require additional safety patterns"

  - condition: "batch or queueable job"
    add_tasks:
      - governor_limit_analysis
      - monitoring_setup
    escalate_complexity: 0.15
    reason: "Async jobs need monitoring and limit management"

  - condition: "production deployment"
    escalate_to: production-change.yaml
    reason: "Production requires additional gates"

# Pattern requirements
required_patterns:
  trigger:
    pattern: "Trigger Handler Pattern"
    requirements:
      - "One trigger per object"
      - "Handler class for logic"
      - "Recursion prevention"
      - "Bypass mechanism for data loads"
    reference: "docs/TRIGGER_HANDLER_PATTERN.md"

  service:
    pattern: "Service Layer Pattern"
    requirements:
      - "Stateless methods"
      - "Bulkified operations"
      - "Clear input/output contracts"
    reference: "docs/SERVICE_LAYER_PATTERN.md"

  selector:
    pattern: "Selector Pattern"
    requirements:
      - "Centralized SOQL"
      - "Consistent field sets"
      - "Security enforcement"
    reference: "docs/SELECTOR_PATTERN.md"

# Common variations
variations:
  trigger_work:
    description: "Trigger development or modification"
    additional_considerations:
      - Order of execution with other triggers
      - Recursion prevention
      - Handler pattern compliance
    add_acceptance_criteria:
      - "Follows one-trigger-per-object pattern"
      - "Handler class implements logic"
      - "Recursion guard in place"

  batch_job:
    description: "Batch Apex development"
    additional_considerations:
      - Batch size optimization
      - Error handling per batch
      - Stateful vs stateless
      - Email notification on completion
    add_acceptance_criteria:
      - "Handles partial failures gracefully"
      - "Batch size tested for governor limits"
      - "Monitoring/alerting configured"

  integration:
    description: "Apex for external integrations"
    additional_considerations:
      - Callout limits
      - Error handling and retry logic
      - Named credentials usage
      - Response parsing
    add_acceptance_criteria:
      - "Uses Named Credentials for auth"
      - "Handles timeout and errors"
      - "Mock callouts in tests"
