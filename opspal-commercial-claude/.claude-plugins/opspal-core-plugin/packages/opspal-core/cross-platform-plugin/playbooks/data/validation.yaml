# Data Validation Playbook
# Standard decomposition pattern for data quality validation
#
# Triggers: validate, verify, check, audit, quality, reconcile
# Complexity: Low-Medium (base 0.3, escalates with complex rules)

name: data-validation
version: "1.0.0"
description: Standard decomposition for data validation operations
domain: data-validation
base_complexity: 0.3

# When to use this playbook
triggers:
  keywords:
    - validate
    - verify
    - check
    - audit
    - quality
    - reconcile
    - integrity
    - consistency
    - completeness
  patterns:
    - "validate.*data"
    - "check.*quality"
    - "verify.*integrity"
    - "audit.*records"
    - "reconcile.*data"

# Default task graph for validation
default_dag:
  - id: T-01
    title: Validation Requirements
    domain: data-validation
    goal: Define validation rules and quality expectations
    inputs:
      - validation_spec
      - data_source
    outputs:
      - validation_rules.json
      - quality_thresholds.json
      - rule_documentation.md
    acceptance_criteria:
      - All validation rules defined
      - Quality thresholds specified
      - Rule priority established
      - Failure handling documented
    dependencies: []
    can_run_in_parallel_with:
      - T-02
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: data-quality-designer
    estimated_complexity: 0.2
    estimated_duration_minutes: 15

  - id: T-02
    title: Data Profiling
    domain: data-validation
    goal: Profile data to understand current state
    inputs:
      - data_source
    outputs:
      - data_profile.json
      - column_stats.json
      - anomaly_flags.json
    acceptance_criteria:
      - All columns profiled
      - Statistics calculated
      - Anomalies identified
      - Patterns documented
    dependencies: []
    can_run_in_parallel_with:
      - T-01
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: data-profiler
    estimated_complexity: 0.2
    estimated_duration_minutes: 15

  - id: T-03
    title: Schema Validation
    domain: data-validation
    goal: Validate data against expected schema
    inputs:
      - data_source
      - validation_rules.json
    outputs:
      - schema_validation.json
      - type_errors.csv
      - constraint_violations.csv
    acceptance_criteria:
      - All columns checked against schema
      - Type mismatches identified
      - Constraint violations logged
      - Nullable rules enforced
    dependencies:
      - T-01
      - T-02
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: data-validator
    estimated_complexity: 0.3
    estimated_duration_minutes: 20

  - id: T-04
    title: Business Rule Validation
    domain: data-validation
    goal: Apply business-specific validation rules
    inputs:
      - data_source
      - validation_rules.json
      - data_profile.json
    outputs:
      - business_rule_results.json
      - rule_violations.csv
      - edge_cases.md
    acceptance_criteria:
      - All business rules applied
      - Violations categorized by severity
      - Edge cases documented
      - False positive rate acceptable
    dependencies:
      - T-03
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: data-validator
    estimated_complexity: 0.4
    estimated_duration_minutes: 25

  - id: T-05
    title: Referential Integrity Check
    domain: data-validation
    goal: Verify relationships and foreign key integrity
    inputs:
      - data_source
      - related_data_sources
    outputs:
      - integrity_report.json
      - orphan_records.csv
      - broken_references.csv
    acceptance_criteria:
      - All relationships verified
      - Orphan records identified
      - Broken references documented
      - Cascade implications noted
    dependencies:
      - T-03
    can_run_in_parallel_with:
      - T-04
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: data-validator
    estimated_complexity: 0.3
    estimated_duration_minutes: 20

  - id: T-06
    title: Quality Score Calculation
    domain: data-validation
    goal: Calculate overall data quality score
    inputs:
      - schema_validation.json
      - business_rule_results.json
      - integrity_report.json
      - quality_thresholds.json
    outputs:
      - quality_score.json
      - dimension_scores.json
      - quality_dashboard.md
    acceptance_criteria:
      - Overall quality score calculated
      - Dimension breakdown provided
      - Trends identified (if historical)
      - Recommendations generated
    dependencies:
      - T-04
      - T-05
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: data-quality-scorer
    estimated_complexity: 0.2
    estimated_duration_minutes: 15

  - id: T-07
    title: Validation Report Generation
    domain: data-validation
    goal: Generate comprehensive validation report
    inputs:
      - all previous outputs
    outputs:
      - validation_report.md
      - executive_summary.md
      - remediation_plan.md
    acceptance_criteria:
      - Report comprehensive
      - Issues prioritized
      - Remediation steps provided
      - Stakeholder-appropriate
    dependencies:
      - T-06
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: documentation-generator
    estimated_complexity: 0.2
    estimated_duration_minutes: 15

# Rules for parallelization
parallelization_rules:
  - description: "Requirements and profiling can run in parallel"
    tasks: [T-01, T-02]
    reason: "Independent analysis activities"

  - description: "Business rules and integrity can run in parallel"
    tasks: [T-04, T-05]
    reason: "Independent validation checks"
    requires: [T-03]

  - description: "Scoring needs all validation results"
    tasks: [T-06]
    requires: [T-04, T-05]
    reason: "Score calculated from all dimensions"

# Rules for sequential execution
sequential_rules:
  - "Profile data before applying rules"
  - "Schema validation before business rules"
  - "All validations before scoring"

# Verification gates
verification_gates:
  - name: profiling_complete
    type: custom
    checks:
      - all_columns_profiled
      - statistics_calculated
      - no_profiler_errors
    required: true

  - name: schema_validation_complete
    type: custom
    checks:
      - all_columns_checked
      - violations_logged
      - no_validator_errors
    required: true

  - name: quality_score_calculated
    type: custom
    checks:
      - score_in_valid_range
      - all_dimensions_scored
      - methodology_documented
    required: true

# Quality dimensions
quality_dimensions:
  completeness:
    description: "Percentage of non-null values"
    calculation: "non_null_count / total_count"
    weight: 0.25

  accuracy:
    description: "Percentage of values matching expected patterns"
    calculation: "valid_pattern_count / total_count"
    weight: 0.25

  consistency:
    description: "Percentage of values consistent with related data"
    calculation: "consistent_count / total_count"
    weight: 0.20

  timeliness:
    description: "Percentage of data within expected age"
    calculation: "fresh_count / total_count"
    weight: 0.15

  uniqueness:
    description: "Percentage of distinct values (for key fields)"
    calculation: "unique_count / total_count"
    weight: 0.15

# Escalation conditions
escalation_triggers:
  - condition: "quality score below threshold"
    add_tasks:
      - root_cause_analysis
      - remediation_planning
    escalate_complexity: 0.2
    reason: "Low quality requires investigation"

  - condition: "data-affecting remediation needed"
    add_tasks:
      - remediation_approval
      - backup_creation
    escalate_complexity: 0.3
    reason: "Data changes require approval"

  - condition: "regulatory/compliance context"
    add_tasks:
      - compliance_documentation
      - audit_trail_creation
    escalate_complexity: 0.2
    reason: "Compliance requires documentation"

# Common variations
variations:
  pre_migration_validation:
    description: "Validate data before migration"
    additional_considerations:
      - Target compatibility
      - Transformation requirements
      - Blocking issues identification
    add_acceptance_criteria:
      - "Migration blockers identified"
      - "Transformation needs documented"
      - "Go/no-go recommendation provided"

  post_load_validation:
    description: "Validate data after loading"
    additional_considerations:
      - Source-to-target reconciliation
      - Load completeness
      - Relationship preservation
    add_acceptance_criteria:
      - "Row counts reconciled"
      - "Key values matched"
      - "Relationships intact"

  ongoing_monitoring:
    description: "Continuous data quality monitoring"
    additional_considerations:
      - Baseline establishment
      - Trend analysis
      - Alert configuration
    add_acceptance_criteria:
      - "Baseline documented"
      - "Anomaly detection active"
      - "Alerts configured"

  compliance_audit:
    description: "Regulatory compliance validation"
    additional_considerations:
      - Regulatory requirements
      - Retention policies
      - Privacy rules
    add_acceptance_criteria:
      - "Compliance requirements met"
      - "Retention verified"
      - "PII handled correctly"
