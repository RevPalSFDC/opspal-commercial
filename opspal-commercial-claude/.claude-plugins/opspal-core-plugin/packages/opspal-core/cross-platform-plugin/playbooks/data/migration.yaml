# Data Migration Playbook
# Standard decomposition pattern for data migrations
#
# Triggers: migrate, migration, move data, transfer, cutover
# Complexity: High (base 0.6, always requires careful planning)

name: data-migration
version: "1.0.0"
description: Standard decomposition for data migration operations
domain: data-migration
base_complexity: 0.6

# When to use this playbook
triggers:
  keywords:
    - migrate
    - migration
    - move data
    - transfer
    - cutover
    - data move
    - system migration
    - platform migration
  patterns:
    - "migrate.*data"
    - "move.*records"
    - "transfer.*from"
    - "cutover.*to"
    - "migration.*project"

# Default risk policy - ALWAYS MEDIUM OR HIGHER
default_risk_level: high
rollback_plan_required: true

# Default task graph for migration
default_dag:
  - id: T-01
    title: Migration Assessment
    domain: data-migration
    goal: Assess source data and migration complexity
    inputs:
      - source_system
      - target_system
      - data_scope
    outputs:
      - assessment_report.md
      - complexity_score.json
      - risk_matrix.json
      - volume_estimates.json
    acceptance_criteria:
      - All source objects identified
      - Data volumes quantified
      - Complexity factors documented
      - Risk areas flagged
    dependencies: []
    can_run_in_parallel_with:
      - T-02
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: migration-assessor
    estimated_complexity: 0.3
    estimated_duration_minutes: 30

  - id: T-02
    title: Target Environment Setup
    domain: data-migration
    goal: Prepare target system for data reception
    inputs:
      - target_system
      - schema_requirements
    outputs:
      - target_schema.json
      - environment_status.json
      - capacity_verification.json
    acceptance_criteria:
      - Target schema exists
      - Storage capacity sufficient
      - Permissions configured
      - Indexes planned
    dependencies: []
    can_run_in_parallel_with:
      - T-01
    concurrency_group: none
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed_with_approval
      destructive_ops: forbidden
    assigned_agent: environment-setup-agent
    estimated_complexity: 0.3
    estimated_duration_minutes: 25

  - id: T-03
    title: Migration Design
    domain: data-migration
    goal: Design migration approach and detailed plan
    inputs:
      - assessment_report.md
      - target_schema.json
      - complexity_score.json
    outputs:
      - migration_plan.md
      - object_sequence.json
      - field_mappings.json
      - dependency_graph.json
    acceptance_criteria:
      - Migration sequence defined
      - Dependencies mapped
      - Field mappings complete
      - Rollback strategy documented
    dependencies:
      - T-01
      - T-02
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    stop_points:
      - Migration plan review
    assigned_agent: migration-architect
    estimated_complexity: 0.4
    estimated_duration_minutes: 35

  - id: T-04
    title: Data Extraction
    domain: data-migration
    goal: Extract data from source system
    inputs:
      - source_system
      - object_sequence.json
      - migration_plan.md
    outputs:
      - extracted_data/
      - extraction_log.json
      - source_checksums.json
    acceptance_criteria:
      - All objects extracted
      - Row counts verified
      - Checksums recorded
      - Referential integrity preserved
    dependencies:
      - T-03
    concurrency_group: data
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: data-extractor
    estimated_complexity: 0.4
    estimated_duration_minutes: 45

  - id: T-05
    title: Data Transformation
    domain: data-transform
    goal: Transform extracted data to target format
    inputs:
      - extracted_data/
      - field_mappings.json
      - target_schema.json
    outputs:
      - transformed_data/
      - transformation_log.json
      - mapping_report.md
    acceptance_criteria:
      - All records transformed
      - Field mappings applied
      - Data types correct
      - Validation rules passed
    dependencies:
      - T-04
    concurrency_group: data
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    playbook_ref: data/transform-work.yaml
    assigned_agent: data-transform-engineer
    estimated_complexity: 0.5
    estimated_duration_minutes: 40

  - id: T-06
    title: Test Load
    domain: data-migration
    goal: Load sample data to validate migration
    inputs:
      - transformed_data/
      - target_system
    outputs:
      - test_load_result.json
      - sample_verification.md
      - performance_metrics.json
    acceptance_criteria:
      - Sample loads successfully
      - Data renders correctly
      - Relationships intact
      - Performance acceptable
    dependencies:
      - T-05
    concurrency_group: data
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: migration-loader
    estimated_complexity: 0.3
    estimated_duration_minutes: 30

  - id: T-07
    title: Full Load Execution
    domain: data-migration
    goal: Execute full data migration
    inputs:
      - transformed_data/
      - target_system
      - test_load_result.json
    outputs:
      - load_result.json
      - load_metrics.json
      - error_records.csv
    acceptance_criteria:
      - All records loaded
      - Success rate >= 99%
      - Errors documented
      - Performance within SLA
    dependencies:
      - T-06
    concurrency_group: data
    risk_level: high
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: allowed_with_approval
    stop_points:
      - Before full load start
      - At 25% completion checkpoint
      - At 50% completion checkpoint
    human_approval_required: true
    assigned_agent: migration-loader
    estimated_complexity: 0.5
    estimated_duration_minutes: 120

  - id: T-08
    title: Post-Migration Validation
    domain: data-migration
    goal: Validate migration completeness and integrity
    inputs:
      - load_result.json
      - source_checksums.json
      - target_system
    outputs:
      - validation_report.md
      - reconciliation.json
      - integrity_check.json
    acceptance_criteria:
      - Row counts match
      - Checksums verified
      - Relationships intact
      - No data corruption
    dependencies:
      - T-07
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    verification_commands:
      - "node scripts/lib/migration-validator.js --source {sourceChecksums} --target {targetSystem}"
    playbook_ref: data/validation.yaml
    assigned_agent: migration-validator
    estimated_complexity: 0.4
    estimated_duration_minutes: 35

  - id: T-09
    title: Cutover & Cleanup
    domain: data-migration
    goal: Complete cutover and cleanup source
    inputs:
      - validation_report.md
      - source_system
      - target_system
    outputs:
      - cutover_status.json
      - cleanup_log.json
      - migration_complete.md
    acceptance_criteria:
      - Users switched to target
      - Source archived (if applicable)
      - Documentation updated
      - Stakeholders notified
    dependencies:
      - T-08
    concurrency_group: none
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: allowed_with_approval
    stop_points:
      - Before cutover
      - Before source cleanup
    human_approval_required: true
    assigned_agent: migration-coordinator
    estimated_complexity: 0.3
    estimated_duration_minutes: 30

# Rollback task (conditional)
rollback_task:
  id: T-ROLLBACK
  title: Migration Rollback
  domain: data-migration
  goal: Restore source as primary and remove migrated data
  inputs:
    - rollback_plan.md
    - target_system
  outputs:
    - rollback_result.json
    - restored_state.json
  acceptance_criteria:
    - Source system restored as primary
    - Target data cleaned (if needed)
    - Users redirected to source
    - Incident documented
  trigger_conditions:
    - validation_failed
    - data_corruption_detected
    - user_initiated_rollback
  concurrency_group: data
  risk_level: high
  tool_policy:
    file_read: allowed
    file_write: allowed
    destructive_ops: allowed
  assigned_agent: migration-coordinator
  estimated_complexity: 0.5
  estimated_duration_minutes: 60

# Rules for parallelization
parallelization_rules:
  - description: "Assessment and environment setup can run in parallel"
    tasks: [T-01, T-02]
    reason: "Independent preparation activities"

  - description: "Design needs both assessment outputs"
    tasks: [T-03]
    requires: [T-01, T-02]
    reason: "Need full picture for migration design"

  - description: "ETL pipeline is strictly sequential"
    tasks: [T-04, T-05, T-06, T-07, T-08]
    constraint: "strict_sequential"
    reason: "Each step depends on previous"

# Rules for sequential execution
sequential_rules:
  - "NEVER load without extraction and transformation"
  - "ALWAYS test with sample before full load"
  - "ALWAYS validate before cutover"
  - "Rollback plan must be ready before load starts"

# Verification gates
verification_gates:
  - name: extraction_verification
    type: custom
    checks:
      - all_objects_extracted
      - row_counts_recorded
      - checksums_calculated
    required: true

  - name: transformation_verification
    type: custom
    checks:
      - schema_compliance
      - no_data_loss
      - type_compatibility
    required: true

  - name: load_verification
    type: custom
    checks:
      - success_rate_threshold
      - no_constraint_violations
      - relationships_intact
    required: true

  - name: reconciliation
    type: command
    command: "node scripts/lib/migration-reconciler.js --source {sourceSystem} --target {targetSystem}"
    success_criteria:
      match_percentage: 99.9
    required: true

# Escalation conditions
escalation_triggers:
  - condition: "production migration"
    add_tasks:
      - production_approval
      - downtime_scheduling
      - communication_plan
    escalate_complexity: 0.3
    reason: "Production requires additional safeguards"

  - condition: "cross-platform migration"
    add_tasks:
      - platform_compatibility_check
      - feature_parity_analysis
    escalate_complexity: 0.2
    reason: "Cross-platform increases complexity"

  - condition: "large volume (10M+ records)"
    add_tasks:
      - chunking_strategy
      - parallel_load_planning
      - extended_window_planning
    escalate_complexity: 0.3
    reason: "Large volumes require special handling"

  - condition: "complex relationships"
    add_tasks:
      - dependency_analysis
      - load_order_optimization
    escalate_complexity: 0.2
    reason: "Complex relationships need careful ordering"

# Common variations
variations:
  salesforce_to_salesforce:
    description: "Org to org migration"
    additional_considerations:
      - External ID strategy
      - Owner mapping
      - Record type alignment
    add_acceptance_criteria:
      - "External IDs preserved"
      - "Owners mapped correctly"
      - "Record types aligned"

  legacy_to_modern:
    description: "Legacy system to modern platform"
    additional_considerations:
      - Data archaeology
      - Schema normalization
      - Feature gap analysis
    add_acceptance_criteria:
      - "Legacy data interpreted"
      - "Schema modernized"
      - "Feature gaps documented"

  incremental_migration:
    description: "Phased migration with incremental loads"
    additional_considerations:
      - Delta identification
      - Sync mechanism
      - Coexistence period
    add_acceptance_criteria:
      - "Deltas captured accurately"
      - "No duplicate loading"
      - "Coexistence managed"

  merger_consolidation:
    description: "Combine multiple sources into one target"
    additional_considerations:
      - Deduplication across sources
      - Conflict resolution
      - Master data determination
    add_acceptance_criteria:
      - "Duplicates merged"
      - "Conflicts resolved"
      - "Golden records identified"
