# HubSpot Integration Setup Playbook
# Standard decomposition pattern for integration configuration
#
# Triggers: integration, api, webhook, sync, connected app
# Complexity: Medium-High (base 0.5, escalates with bidirectional sync)

name: hubspot-integration-setup
version: "1.0.0"
description: Standard decomposition for HubSpot integration setup
domain: integration
base_complexity: 0.5

# When to use this playbook
triggers:
  keywords:
    - integration
    - api
    - webhook
    - sync
    - connected app
    - oauth
    - private app
    - middleware
    - zapier
    - make
  patterns:
    - "set up.*integration"
    - "connect.*hubspot"
    - "webhook.*endpoint"
    - "sync.*with.*hubspot"
    - "api.*connection"

# Default task graph for integration setup
default_dag:
  - id: T-01
    title: Integration Requirements
    domain: integration
    goal: Define integration requirements and data flow
    inputs:
      - integration_spec
      - source_system
      - target_system
    outputs:
      - integration_requirements.md
      - data_flow_diagram.md
      - field_mapping.json
    acceptance_criteria:
      - Data flow documented
      - All entities mapped
      - Sync frequency defined
      - Error handling specified
    dependencies: []
    can_run_in_parallel_with:
      - T-02
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: integration-architect
    estimated_complexity: 0.3
    estimated_duration_minutes: 25

  - id: T-02
    title: Authentication Setup
    domain: integration
    goal: Configure authentication mechanism
    inputs:
      - portal_id
      - auth_method
    outputs:
      - app_credentials.json  # Encrypted
      - oauth_config.json
      - auth_test_result.json
    acceptance_criteria:
      - App created in HubSpot
      - Required scopes granted
      - Authentication verified
      - Credentials secured
    dependencies: []
    can_run_in_parallel_with:
      - T-01
    concurrency_group: none
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    stop_points:
      - Before creating private app
    assigned_agent: hubspot-auth-manager
    estimated_complexity: 0.3
    estimated_duration_minutes: 20

  - id: T-03
    title: Endpoint Configuration
    domain: integration
    goal: Configure API endpoints or webhook handlers
    inputs:
      - integration_requirements.md
      - field_mapping.json
      - auth_config.json
    outputs:
      - endpoint_config.json
      - webhook_subscriptions.json
      - route_definitions.md
    acceptance_criteria:
      - All endpoints configured
      - Webhook subscriptions active
      - Payload formats documented
      - Rate limits understood
    dependencies:
      - T-01
      - T-02
    concurrency_group: integration
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: hubspot-api-configurator
    estimated_complexity: 0.4
    estimated_duration_minutes: 30

  - id: T-04
    title: Data Mapping Implementation
    domain: data-transform
    goal: Implement field transformations and mappings
    inputs:
      - field_mapping.json
      - endpoint_config.json
    outputs:
      - transform_rules.json
      - mapping_functions.js
      - validation_rules.json
    acceptance_criteria:
      - All fields mapped
      - Transformations tested
      - Validation rules active
      - Edge cases handled
    dependencies:
      - T-03
    concurrency_group: integration
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: data-transform-engineer
    estimated_complexity: 0.4
    estimated_duration_minutes: 30

  - id: T-05
    title: Integration Testing
    domain: integration
    goal: Test integration end-to-end
    inputs:
      - endpoint_config.json
      - transform_rules.json
      - auth_config.json
    outputs:
      - test_results.json
      - sync_test_log.txt
      - error_scenarios.md
    acceptance_criteria:
      - Sync successful in both directions (if applicable)
      - Error handling verified
      - Rate limits not exceeded
      - Data integrity maintained
    dependencies:
      - T-04
    concurrency_group: integration
    risk_level: medium
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    verification_commands:
      - "node scripts/lib/integration-tester.js --config {configPath} --mode full"
    assigned_agent: integration-tester
    estimated_complexity: 0.5
    estimated_duration_minutes: 35

  - id: T-06
    title: Monitoring Setup
    domain: integration
    goal: Configure monitoring and alerting
    inputs:
      - endpoint_config.json
      - integration_requirements.md
    outputs:
      - monitoring_config.json
      - alert_rules.json
      - dashboard_spec.json
    acceptance_criteria:
      - Health checks configured
      - Error alerts active
      - Performance metrics tracked
      - Dashboard available
    dependencies:
      - T-05
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: integration-monitoring-setup
    estimated_complexity: 0.3
    estimated_duration_minutes: 20

  - id: T-07
    title: Documentation & Handoff
    domain: process
    goal: Document integration and prepare for operations
    inputs:
      - all task outputs
    outputs:
      - integration_runbook.md
      - troubleshooting_guide.md
      - operations_checklist.md
    acceptance_criteria:
      - Runbook complete
      - Troubleshooting documented
      - Operations team trained
      - Support contacts identified
    dependencies:
      - T-06
    concurrency_group: none
    risk_level: low
    tool_policy:
      file_read: allowed
      file_write: allowed
      destructive_ops: forbidden
    assigned_agent: documentation-generator
    estimated_complexity: 0.2
    estimated_duration_minutes: 20

# Rules for parallelization
parallelization_rules:
  - description: "Requirements and auth setup can run in parallel"
    tasks: [T-01, T-02]
    reason: "Independent setup activities"

  - description: "Endpoint config needs both requirements and auth"
    tasks: [T-03]
    requires: [T-01, T-02]
    reason: "Need full picture before configuring endpoints"

  - description: "Implementation through testing is sequential"
    tasks: [T-04, T-05]
    constraint: "strict_sequential"
    reason: "Each step builds on previous"

  - description: "Monitoring and documentation can run in parallel"
    tasks: [T-06, T-07]
    reason: "Independent final tasks"
    requires: [T-05]

# Rules for sequential execution
sequential_rules:
  - "Authenticate before configuring endpoints"
  - "Map data before testing integration"
  - "Test before setting up monitoring"

# Verification gates
verification_gates:
  - name: auth_verification
    type: custom
    checks:
      - oauth_token_valid
      - scopes_sufficient
      - refresh_working
    required: true

  - name: endpoint_health
    type: command
    command: "node scripts/lib/hubspot-health-check.js --app {appId}"
    success_criteria:
      status: healthy
    required: true

  - name: sync_test
    type: custom
    checks:
      - outbound_sync_works
      - inbound_sync_works
      - no_data_loss
      - conflict_resolution_works
    required: true

  - name: monitoring_active
    type: custom
    checks:
      - health_checks_running
      - alerts_configured
      - dashboards_accessible
    required: true

# Escalation conditions
escalation_triggers:
  - condition: "bidirectional sync"
    add_tasks:
      - conflict_resolution_design
      - sync_direction_rules
    escalate_complexity: 0.3
    reason: "Bidirectional sync is significantly more complex"

  - condition: "real-time sync (webhooks)"
    add_tasks:
      - webhook_security_review
      - idempotency_implementation
    escalate_complexity: 0.2
    reason: "Real-time requires idempotency and security"

  - condition: "multi-object sync"
    add_tasks:
      - dependency_mapping
      - sync_order_planning
    escalate_complexity: 0.2
    reason: "Multiple objects require ordering"

  - condition: "production integration"
    add_tasks:
      - load_testing
      - disaster_recovery_plan
    escalate_complexity: 0.2
    reason: "Production requires additional reliability"

# Common variations
variations:
  salesforce_sync:
    description: "HubSpot to Salesforce sync"
    additional_considerations:
      - Native connector vs custom
      - Field-level sync settings
      - Duplicate management
    add_acceptance_criteria:
      - "Sync direction clear"
      - "Duplicate rules configured"
      - "Selective sync working"
    assigned_playbook_ref: cross-platform/sync-operations.yaml

  middleware_integration:
    description: "Integration via Zapier/Make/Workato"
    additional_considerations:
      - Middleware limitations
      - Rate limit sharing
      - Error visibility
    add_acceptance_criteria:
      - "Middleware task limits understood"
      - "Error notifications configured"
      - "Retry logic appropriate"

  custom_api:
    description: "Custom application integration"
    additional_considerations:
      - Custom code maintenance
      - Version compatibility
      - Security review
    add_acceptance_criteria:
      - "Code reviewed for security"
      - "API versioning handled"
      - "Maintenance plan in place"

  webhook_receiver:
    description: "Receive webhooks from HubSpot"
    additional_considerations:
      - Endpoint security
      - Payload validation
      - Processing queue
    add_acceptance_criteria:
      - "Signature validation implemented"
      - "Idempotent processing"
      - "Queue overflow handled"
