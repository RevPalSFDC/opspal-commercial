usage_pattern: |
  ## How to Use Asana Integration Playbook

  ### In Agent Instructions
  Reference the playbook when performing Asana operations:

  ```markdown
  When creating or updating Asana tasks:
  1. Review update templates in @import playbook-reference.yaml (asana_integration)
  2. Follow brevity requirements (< 100 words)
  3. Use structured format: Progress → Next Steps → Blockers
  4. Tag relevant stakeholders with @mentions
  ```

  ### Update Template Selection
  Choose appropriate template based on update type:
  - **Progress Update**: Intermediate checkpoints (50-75 words)
  - **Blocker Update**: Report blockers (40-60 words)
  - **Completion Update**: Task completion (60-100 words)
  - **Milestone Update**: Phase completion (100-150 words)

  ### For Task Reading
  Parse Asana tasks into agent-friendly format:
  - Extract structured fields (status, priority, due date)
  - Read description for requirements
  - Get project context
  - Check dependencies
  - Review recent comments

  See @import playbook-reference.yaml for complete patterns and examples.
