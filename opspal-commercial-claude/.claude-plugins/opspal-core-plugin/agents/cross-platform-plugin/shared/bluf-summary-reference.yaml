# =============================================================================
# BLUF+4 Executive Summary Reference
# =============================================================================
#
# Purpose: @import reference for auditor/assessor agents to integrate BLUF+4
# Version: 1.0.0
# Created: 2025-11-25
#
# Usage: Add to any auditor agent's instructions:
#   @import agents/shared/bluf-summary-reference.yaml
#
# =============================================================================

bluf_integration:
  # Script locations
  generator: scripts/lib/bluf-summary-generator.js
  extractor: scripts/lib/bluf-data-extractor.js
  validator: templates/executive-summaries/lib/bluf4-validator.js

  # Template and schema
  template: templates/executive-summaries/bluf4-template.md
  schema: templates/executive-summaries/bluf4-schema.json

  # PDF generation
  pdf_helper: scripts/lib/pdf-generation-helper.js
  pdf_method: generateWithBLUFSummary

# =============================================================================
# BLUF+4 Format Reference
# =============================================================================

format:
  name: "BLUF+4"
  description: "Bottom Line Up Front plus 4 supporting sections"

  sections:
    - name: "Bottom Line"
      purpose: "Conclusion or recommendation - the key takeaway"
      word_limit: 40
      required: true
      components:
        - severity: "CRITICAL | ACTION REQUIRED | ATTENTION | OPPORTUNITY | ON TRACK"
        - headline: "One sentence conclusion (max 150 chars)"
        - recommendation: "Primary recommendation (optional)"
        - roi: "Projected business impact (optional)"

    - name: "Situation"
      purpose: "Current state assessment"
      word_limit: 50
      required: true
      components:
        - health_score: "0-100 score with icon indicator"
        - key_findings: "3-5 findings with metrics"
        - comparison: "Benchmark comparison (optional)"

    - name: "Next Steps"
      purpose: "Prioritized actions to take"
      word_limit: 55
      required: true
      components:
        - actions: "3-5 actions with owner and timeline"

    - name: "Risks & Blockers"
      purpose: "Impediments to progress"
      word_limit: 40
      required: false
      components:
        - risks: "Up to 4 risks with severity and mitigation"

    - name: "Support Needed"
      purpose: "Decisions, approvals, and resources required"
      word_limit: 35
      required: false
      components:
        - decisions: "Up to 3 decisions required"
        - approvals: "Up to 3 approvals needed"
        - resources: "Up to 3 resources needed"

  total_word_limit: 220

# =============================================================================
# Agent Integration Instructions
# =============================================================================

integration_steps:
  - step: 1
    title: "Structure your output for BLUF extraction"
    description: |
      Ensure your audit output contains these fields:
      - executive_summary or summary (for headline)
      - health_score or score (0-100)
      - findings or issues (array of findings)
      - recommendations or next_steps (array of actions)
      - risks or blockers (array of risks)

  - step: 2
    title: "Generate BLUF+4 at workflow completion"
    description: |
      At the end of your workflow, invoke the BLUF generator:

      ```javascript
      const BLUFSummaryGenerator = require('cross-platform-plugin/scripts/lib/bluf-summary-generator');
      const generator = new BLUFSummaryGenerator();

      const summary = await generator.generate({
        headline: auditResults.summary,
        severity: getSeverityFromScore(auditResults.healthScore),
        recommendation: auditResults.recommendations[0],
        roi: auditResults.roi,
        healthScore: auditResults.healthScore,
        keyFindings: auditResults.findings.slice(0, 5),
        nextSteps: auditResults.recommendations.slice(0, 5),
        risks: auditResults.risks.slice(0, 4),
        decisions: auditResults.decisionsNeeded,
        metadata: {
          reportType: 'Your Audit Type',
          org: orgAlias
        }
      }, { format: 'markdown' });
      ```

  - step: 3
    title: "Include in PDF generation"
    description: |
      When generating the final PDF deliverable:

      ```javascript
      const PDFGenerationHelper = require('cross-platform-plugin/scripts/lib/pdf-generation-helper');

      await PDFGenerationHelper.generateWithBLUFSummary({
        blufInput: extractedData,
        documents: [
          { path: 'detailed-analysis.md', title: 'Detailed Analysis', order: 10 }
        ],
        orgAlias: 'acme-corp',
        outputDir: './reports',
        reportType: 'CPQ Assessment',
        coverTemplate: 'executive-report'
      });
      ```

# =============================================================================
# Auto-Generation (Opt-Out Available)
# =============================================================================

auto_generation:
  enabled_by_default: true
  hook: hooks/post-audit-bluf-generator.sh
  trigger: "PostToolUse when Task tool completes with audit agent"

  opt_out_methods:
    - method: "Environment variable"
      command: "export ENABLE_AUTO_BLUF=0"
    - method: "Per-task flag"
      usage: "[NO_BLUF] Run CPQ assessment for acme-corp"
    - method: "Preferences file"
      path: "~/.claude/preferences.json"

  configuration:
    ENABLE_AUTO_BLUF: "1 (enabled) or 0 (disabled)"
    BLUF_OUTPUT_FORMAT: "terminal | markdown | json"
    BLUF_SAVE_TO_FILE: "0 (disabled) or 1 (enabled)"

# =============================================================================
# Quality Checklist
# =============================================================================

quality_checklist:
  required:
    - "Bottom line headline is present"
    - "At least 1 key finding"
    - "At least 1 next step"
    - "Total word count under 220"

  recommended:
    - "Health score with icon"
    - "ROI or projected impact"
    - "Severity indicator"
    - "Owners assigned to actions"
    - "Timelines on actions"
    - "Mitigations for critical risks"

  must_avoid:
    - "Process details (I ran a query...)"
    - "Technical jargon (SOQL, APEX, DML)"
    - "Vague quantifiers (some, several, many)"
    - "Filler words (basically, actually, really)"
    - "Passive voice (was found, has been)"

# =============================================================================
# Severity Mapping
# =============================================================================

severity_mapping:
  - score_range: "90-100"
    severity: "ON TRACK"
    icon: "green_circle"
    description: "Excellent health, no concerns"

  - score_range: "70-89"
    severity: "OPPORTUNITY"
    icon: "green_circle"
    description: "Good health, minor improvements possible"

  - score_range: "50-69"
    severity: "ATTENTION"
    icon: "yellow_circle"
    description: "Moderate health, action recommended"

  - score_range: "30-49"
    severity: "ACTION REQUIRED"
    icon: "yellow_circle"
    description: "At risk, action needed soon"

  - score_range: "0-29"
    severity: "CRITICAL"
    icon: "red_circle"
    description: "Critical health, immediate action required"
