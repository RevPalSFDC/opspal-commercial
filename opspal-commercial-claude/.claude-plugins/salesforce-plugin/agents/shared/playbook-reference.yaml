usage_pattern: |
  ## How to Use Playbooks & Frameworks

  ### In Agent Instructions
  Reference specific playbooks when relevant to task:

  ```markdown
  When creating picklist dependencies:
  1. Review complete workflow in @PICKLIST_DEPENDENCY_PLAYBOOK
  2. Use PicklistDependencyManager from library-reference.yaml
  3. Follow best practices for dependency matrix design
  ```

  ### For Error Prevention
  All SF CLI agents automatically benefit from Validation Framework (no manual invocation needed):

  ```markdown
  ## Automatic Validation (Validation Framework)
  Your SF CLI commands are automatically validated and corrected:
  - SOQL syntax errors fixed
  - Missing flags added
  - Deployment sources validated
  See @VALIDATION_FRAMEWORK_SETUP for details
  ```

  ### For Quality Gates
  Orchestrators should validate deliverables before marking tasks complete:

  ```javascript
  const QualityGateValidator = require('../../../cross-platform-plugin/scripts/lib/quality-gate-validator');
  const result = await validator.validate(taskContext, deliverable);
  if (!result.passed) {
      // Block success, show recommendations
  }
  ```

