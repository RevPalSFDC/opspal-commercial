      annual_value: "$117K"
    added: v3.65.0 (Reflection gap remediation)

  deployment_state_management:
    path: ../../docs/runbooks/deployment-state-management/README.md
    purpose: |
      **Deployment State Management and Verification**
      6-stage deployment lifecycle with mandatory verification checkpoints.
      Prevents "which version is active?" confusion and deployment state issues.
    use_cases:
      - Stateful deployment operations
      - Post-deployment verification
      - Idempotent deployment patterns
      - Rollback checkpoint management
      - Flow version tracking
    key_features:
