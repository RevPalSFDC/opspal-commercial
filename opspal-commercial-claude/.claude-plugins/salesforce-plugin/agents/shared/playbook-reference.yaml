# Salesforce Plugin - Shared Playbook & Framework Reference
# Version: 1.0.0
# Last Updated: 2025-10-26
#
# This file documents operational playbooks and frameworks available to agents.
# Import this file to access comprehensive guides for complex operations.

playbooks:
  picklist_dependency:
    path: ../../docs/PICKLIST_DEPENDENCY_PLAYBOOK.md
    purpose: |
      **Complete Guide to Salesforce Picklist Field Dependencies**
      Master picklist dependencies with controlling/dependent fields, dependency matrices, and advanced scenarios.
    use_cases:
      - Creating new picklist dependencies
      - Updating existing dependency matrices
      - Troubleshooting dependency issues
      - Designing data models with picklists
      - Managing record type-specific picklist values
    key_features:
      - "Complete workflows with code examples"
      - "Dependency matrix management"
      - "Record type integration"
      - "Troubleshooting guide"
      - "Best practices and anti-patterns"
    mandatory_for:
      - Field creation/modification agents
      - Metadata management agents
      - Data modeling agents
      - UI customization agents
    tools_referenced:
      - picklist-dependency-manager.js
      - unified-picklist-manager.js
    added: v3.41.0 (Phase 2 playbook wiring)

  performance_optimization:
    path: ../../docs/PERFORMANCE_OPTIMIZATION_PLAYBOOK.md
    purpose: |
      **Performance optimization strategies for Salesforce operations**
      Optimize queries, bulk operations, and API usage for maximum performance.
    use_cases:
      - Optimizing SOQL queries
      - Improving bulk data operations
      - Reducing API call usage
      - Governor limit management
    added: v3.41.0 (Phase 2 playbook wiring)

  safe_flow_deployment:
    path: ../../templates/playbooks/safe-flow-deployment/README.md
    purpose: |
      **Complete 5-Step Flow Deployment Pattern (OOO D3)**
      Deploy flows safely with: Deploy Inactive → Verify → Activate → Smoke Test → Rollback on failure.
      Prevents zero-surprise activations and provides immediate rollback on smoke test failures.
    use_cases:
      - Production flow deployments
      - Flows with field updates or record creation
      - Process automation with business logic
      - Record-triggered flows
      - Screen flows with data modifications
    key_features:
      - "5-step safety pattern (Deploy Inactive → Verify → Activate → Test → Rollback)"
      - "Automatic smoke testing with expected outcome validation"
      - "Rollback on failure with clear remediation guidance"
      - "Field reference verification before deployment"
      - "FLS confirmation for all flow-referenced fields"
      - "Flow interview debugging for troubleshooting"
    mandatory_for:
      - Flow deployment agents
      - Automation builder agents
      - Metadata management agents
      - Orchestration agents
      - Any agent deploying flows to production
    tools_referenced:
      - ooo-metadata-operations.js
      - ooo-flow-rollback.js
      - flow-field-extractor.js
      - org-metadata-cache.js
    roi_metrics:
      prevents: "Zero-surprise flow activations, production incidents from untested flows"
      time_saved: "30-60 minutes per flow deployment incident avoided"
      annual_value: "$10-15K (assuming 20 flow deployments/year)"
    added: v3.42.0 (Flow playbook wiring)

  flow_design_best_practices:
    path: ../../docs/FLOW_DESIGN_BEST_PRACTICES.md
    purpose: |
      **Flow Design Patterns and Anti-Patterns**
      Comprehensive guide to designing maintainable, performant Salesforce Flows.
      Covers best practices, common pitfalls, and optimization strategies.
    use_cases:
      - Designing new flows from scratch
      - Reviewing existing flow quality
      - Troubleshooting flow performance issues
      - Flow architecture decisions
      - Refactoring complex flows
    key_features:
      - "Design patterns for common automation scenarios"
      - "Anti-patterns to avoid (performance, maintainability)"
      - "Governor limit optimization strategies"
      - "Bulkification best practices"
      - "Flow debugging techniques"
      - "Decision vs Assignment element selection"
    mandatory_for:
      - Flow authoring agents
      - Automation builder agents
      - Quality auditor agents
      - Architecture review agents
    roi_metrics:
      prevents: "Performance issues, governor limit exceptions, technical debt"
      time_saved: "50-100 hours/year in flow refactoring and troubleshooting"
      annual_value: "$7.5-15K"
    added: v3.42.0 (Flow playbook wiring)

  flow_version_management:
    path: ../../docs/FLOW_VERSION_MANAGEMENT.md
    purpose: |
      **Flow Version Lifecycle Management**
      Complete guide to flow versioning, activation, deactivation, and deprecation strategies.
      Covers version rollback procedures and production version management.
    use_cases:
      - Managing flow versions across environments
      - Flow activation/deactivation workflows
      - Flow deprecation planning
      - Version rollback procedures
      - Production version tracking
    key_features:
      - "Version lifecycle (Draft → Active → Obsolete)"
      - "Safe activation patterns"
      - "Rollback procedures"
      - "Version comparison strategies"
      - "Deprecated flow migration planning"
    mandatory_for:
      - Flow deployment agents
      - Metadata management agents
      - Orchestration agents
      - Version control agents
    tools_referenced:
      - FlowDefinition API
      - Flow Tooling API
      - runbook-versioner.js
    roi_metrics:
      prevents: "Version sprawl, accidental version overwrites, rollback confusion"
      time_saved: "20-40 hours/year in version management"
      annual_value: "$3-6K"
    added: v3.42.0 (Flow playbook wiring)

  safe_record_creation:
    path: ../../templates/playbooks/safe-record-creation/README.md
    purpose: |
      **7-Step Safe Record Creation Pattern (OOO D1 Sequence)**
      Validates records before creation: Describe → Validation Rules → Record Types → FLS → Lookups → Create → Verify.
      Prevents validation rule violations, FLS errors, and record type mismatches.
    use_cases:
      - Production record creation
      - Complex validation rules present
      - Record type requirements
      - Dependent picklist fields
      - Master-detail relationships
      - Data migration operations
    key_features:
      - "Object introspection (required fields, types)"
      - "Active validation rule analysis"
      - "Record type resolution"
      - "FLS verification"
      - "Lookup name-to-ID resolution"
      - "Post-creation verification"
      - "Automatic error rollback"
    mandatory_for:
      - Data creation agents
      - CPQ specialists
      - Sales operations agents
      - Data migration agents
      - Bulk data loading agents
    tools_referenced:
      - ooo-write-operations.js
      - ooo-validation-rule-analyzer.js
      - org-metadata-cache.js
    roi_metrics:
      prevents: "Validation rule violations, FLS errors, record type mismatches, malformed records"
      time_saved: "20-40 hours/year in debugging and fixing failed record creations"
      annual_value: "$3-6K"
    added: v3.42.0 (Complete playbook wiring)

