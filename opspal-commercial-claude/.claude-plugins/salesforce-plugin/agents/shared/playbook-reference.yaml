    added: v3.65.0 (Reflection gap remediation)

frameworks:
  validation_framework:
    path: ../../docs/VALIDATION_FRAMEWORK_SETUP.md
    purpose: |
      **Salesforce CLI Error Prevention Framework**
      Automatic validation and correction of SF CLI commands (SOQL, deployment, CSV).
      Prevents 95% of 7 recurring error types.
    error_types_prevented:
      - INVALID_FIELD: "Wrong Tooling API object fields (ApiName → DeveloperName)"
      - MALFORMED_QUERY: "Mixed operators in SOQL (= and LIKE consistency)"
      - INVALID_TYPE: "Missing --use-tooling-api flag"
      - ComponentSetError: "Invalid deployment source paths"
      - LINE_ENDING_ISSUE: "CSV CRLF → LF conversion"
    roi_metrics:
      time_saved: "100-150 hours/year"
      annual_value: "$15-22K @ $150/hour"
      prevention_rate: "95%"
    tools_included:
      - query-lint.js: "SOQL syntax validation"
      - deployment-source-validator.js: "Deployment path validation"
      - pre-sf-command-validation.sh: "Automatic SF CLI interception"
    setup_time: "5 minutes"
    mandatory_for:
      - All agents executing SF CLI commands
      - All agents writing SOQL queries
      - All agents deploying metadata
      - Quality/validation agents
    added: v3.41.0 (Phase 2 playbook wiring)

  agent_governance:
    path: ../../docs/AGENT_GOVERNANCE_FRAMEWORK.md
    purpose: |
      **Agent behavior governance, risk assessment, and approval workflows**
      Manages agent permissions, calculates risk scores, routes approvals, ensures compliance.
    capabilities:
      - Permission matrix enforcement
      - Risk score calculation
      - Approval workflow routing
      - Audit trail generation
      - Compliance validation
    risk_tiers:
      - low: "Auto-approve (read-only, sandbox)"
      - medium: "Human review required"
      - high: "Multi-approval required (production writes)"
      - critical: "Governance board approval"
    mandatory_for:
      - Orchestrator agents
      - Deployment agents
      - Production operation agents
      - Governance/security agents
    added: v3.41.0 (Phase 2 playbook wiring)

  quality_gate:
    path: ../../../cross-platform-plugin/docs/QUALITY_GATE_FRAMEWORK.md
    purpose: |
      **Deliverable validation before success declaration**
      Validates task outputs against requirements, blocks incomplete deliverables.
      Prevents unverified success claims and incomplete work.
    validation_types:
      - report_generation: "Markdown/PDF reports exist and complete"
      - metadata_deployment: "Deployment successful, components verified"
      - data_operation: "Records created/updated, counts match"
      - assessment: "All sections complete, findings documented"
    quality_checks:
      - File existence verification
      - Content completeness validation
      - Requirement matching
      - Post-execution verification
    roi_metrics:
      prevents: "8 types of quality issues (Cohort #1)"
      annual_value: "$20K"
    mandatory_for:
      - Assessment/audit agents
      - Report generation agents
      - Orchestrator agents
      - Deployment agents
    tools_referenced:
      - quality-gate-validator.js
    added: v3.41.0 (Phase 2 playbook wiring)

  external_api_capabilities:
    path: ../../docs/api-capability-matrix.md
    purpose: |
      **External API Capability Matrix**
      Documents automation feasibility for Salesforce Metadata API, HubSpot API, and other external APIs.
      Prevents 13+ types of API limitation errors.
    api_coverage:
      - salesforce_metadata_api: "Fully/partially/unsupported operations matrix"
      - hubspot_lists_api: "Filter operator syntax requirements"
      - salesforce_merge_api: "Merge vs Delete behavior differences"
      - system_dependencies: "OS-specific package names"
    key_capabilities:
