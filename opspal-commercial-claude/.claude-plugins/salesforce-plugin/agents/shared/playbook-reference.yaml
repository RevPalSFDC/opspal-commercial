      - Integration specialists
      - Automation builders
    roi_metrics:
      prevents: "13 reflection incidents, API limitation errors"
      annual_value: "$39K"
    added: v3.65.0 (Reflection gap remediation)

  environment_configuration:
    path: ../../docs/runbooks/environment-configuration/README.md
